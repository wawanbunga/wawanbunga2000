<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Wawan Bunga</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --or:#C2500A;--orl:#E8650A;--orp:#FFF3EB;--orm:#FFD5B0;
  --bg:#f5f0eb;--w:#fff;
  --t:#1a0e05;--tx:#1a0e05;--tm:#7a4020;--tl:#b07850;
  --b:#e8d5c0;
  --sh:0 1px 8px rgba(194,80,10,.10);
  --shm:0 6px 28px rgba(194,80,10,.18);
  --r:16px;--rs:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow-x:hidden;background:var(--bg)}
body{font-family:'Plus Jakarta Sans',sans-serif;color:var(--t);
  display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;}

#LS{flex:1;min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(155deg,#1a0800 0%,#5c1a00 50%,#C2500A 100%);
  padding:20px;position:relative;overflow:hidden}
#LS::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 20% 20%,rgba(232,101,10,.22),transparent 55%),
             radial-gradient(ellipse at 80% 80%,rgba(255,180,80,.10),transparent 50%);pointer-events:none}
.lc{background:#fff;border-radius:24px;padding:38px 24px 32px;width:100%;max-width:360px;
  box-shadow:0 28px 70px rgba(0,0,0,.38);position:relative;z-index:1}
.ll{text-align:center;margin-bottom:28px}
.ll-logo{width:62px;height:62px;border-radius:18px;background:linear-gradient(135deg,#E8650A,#C2500A);
  display:flex;align-items:center;justify-content:center;margin:0 auto 12px;
  box-shadow:0 6px 20px rgba(194,80,10,.35)}
.ll-logo i{font-size:32px;color:#fff}
.ll h1{font-family:'Playfair Display',serif;font-size:24px;color:var(--or)}
.ll p{color:var(--tl);font-size:12px;margin-top:4px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--tm);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fi{width:100%;padding:12px 14px;border:1.5px solid var(--b);border-radius:var(--rs);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:var(--t);background:#fff;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--orl)}
.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,#E8650A,#C2500A);color:#fff;border:none;
  border-radius:var(--rs);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;
  box-shadow:0 4px 16px rgba(194,80,10,.35);transition:opacity .2s}
.btn-login:active{opacity:.85}
.lerr{color:#c0392b;font-size:12px;margin-top:8px;text-align:center;display:none}
.demo-hint{margin-top:16px;font-size:11px;color:#bbb;text-align:center;line-height:2}

#APP{display:none;flex-direction:column;flex:1;width:100%;min-height:100vh;min-height:100dvh;background:var(--bg)}

.tb{background:linear-gradient(135deg,#E8650A,#C2500A);color:#fff;padding:10px 12px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;box-shadow:0 4px 18px rgba(194,80,10,.28);
  width:100%;gap:8px}
.tb-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.tb-back{background:rgba(255,255,255,.18);border:none;color:#fff;width:34px;height:34px;
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:20px;flex-shrink:0;transition:background .15s}
.tb-back:active{background:rgba(255,255,255,.35)}
.tb-logo{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tb-title{font-family:'Playfair Display',serif;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.tb-sub{font-size:10px;opacity:.75;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.btn-out{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;
  padding:5px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600}

.mc{flex:1;padding:12px;max-width:480px;margin:0 auto;width:100%;padding-bottom:32px}

.home-header{text-align:center;padding:18px 0 20px}
.home-header h2{font-family:'Playfair Display',serif;font-size:24px;color:var(--or)}
.home-header p{font-size:12px;color:var(--tl);margin-top:4px}

.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.menu-card{background:var(--w);border-radius:var(--r);padding:13px 10px 11px;
  border:1.5px solid var(--b);cursor:pointer;transition:all .18s;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  box-shadow:var(--sh);text-align:center;position:relative;overflow:hidden}
.menu-card:active{transform:scale(.96);box-shadow:var(--shm)}
.mc-icon-wrap{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:1px}
.mc-label{font-size:13px;font-weight:700;color:var(--t)}
.mc-sub{font-size:10px;color:var(--tl)}
.menu-card.or{border-color:var(--orm);background:var(--orp)}
.menu-card.green{border-color:#c3e8d4;background:#edf7f1}
.menu-card.blue{border-color:#bfdbfe;background:#eff6ff}
.menu-card.purple{border-color:#ddd6fe;background:#f5f3ff}
.menu-card.gold{border-color:#fde68a;background:#fefce8}
.menu-card.red{border-color:#fecaca;background:#fef2f2}

.sec{font-size:11px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.8px;margin-bottom:9px;padding-left:2px}
.cd{background:var(--w);border-radius:var(--r);padding:16px;box-shadow:var(--sh);margin-bottom:12px;border:1.5px solid var(--b)}
.ct{font-family:'Playfair Display',serif;font-size:17px;color:var(--or);margin-bottom:12px;display:flex;align-items:center;gap:8px}

.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;border:1.5px solid var(--b);max-width:100%}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:400px}
th{background:linear-gradient(135deg,#E8650A,#C2500A);color:#fff;padding:8px 5px;text-align:center;white-space:nowrap;font-weight:700;font-size:10px;font-family:'Plus Jakarta Sans',sans-serif}
th:first-child{text-align:left;padding-left:10px}
td{padding:6px 5px;text-align:center;border-bottom:1px solid var(--b);font-size:11px}
td:first-child{text-align:left;padding-left:10px;font-weight:600}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:#fdf8f5}

.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.b-or{background:var(--orp);color:var(--or);border:1px solid var(--orm)}
.b-bl{background:#eff6ff;color:#1D4ED8;border:1px solid #bfdbfe}
.b-gr{background:#edf7f1;color:#15803D;border:1px solid #c3e8d4}
.b-rd{background:#fdf2f1;color:#c0392b;border:1px solid #fecaca}

.mo{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .22s}
.mo.show{opacity:1;pointer-events:all}
.ms{background:var(--w);border-radius:18px 18px 0 0;padding:0 14px calc(22px + env(safe-area-inset-bottom));
  width:100%;max-width:288px;max-height:62vh;overflow-y:auto;
  transform:translateY(60px);transition:transform .28s cubic-bezier(.32,1,.5,1)}
.mo.show .ms{transform:translateY(0)}
.td-sticky{position:sticky;left:0;background:#fff;z-index:2;min-width:72px;max-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
th.td-sticky{background:linear-gradient(135deg,#E8650A,#C2500A);}
tr:nth-child(even) td.td-sticky{background:#fdf8f5}
.mh{width:28px;height:3px;background:var(--b);border-radius:2px;margin:10px auto 12px}
.mt{font-family:'Playfair Display',serif;font-size:14px;color:var(--or);margin-bottom:11px}
.fg2{margin-bottom:9px}
.fg2 label{display:block;font-size:10px;font-weight:700;color:var(--tm);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.fi2{width:100%;padding:8px 10px;border:1.5px solid var(--b);border-radius:var(--rs);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:var(--t);background:#fff;outline:none;transition:border-color .2s}
.fi2:focus{border-color:var(--orl)}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--b);font-size:12px}
.info-row:last-child{border-bottom:none}
.info-val{font-weight:700;color:var(--t)}
.info-val.or{color:var(--or)}
.mo-btns{display:flex;gap:7px;margin-top:12px}
.btn-cancel{flex:1;padding:9px;background:var(--bg);border:1.5px solid var(--b);border-radius:var(--rs);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:var(--tm)}
.btn-save{flex:2;padding:9px;background:linear-gradient(135deg,#E8650A,#C2500A);color:#fff;border:none;
  border-radius:var(--rs);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;
  box-shadow:0 3px 12px rgba(194,80,10,.3)}
.btn-save:active{opacity:.85}

.li{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--b)}
.li:last-child{border-bottom:none}
.av{width:40px;height:40px;border-radius:50%;background:var(--orp);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--or);flex-shrink:0;border:1.5px solid var(--orm)}
.wn{font-size:14px;font-weight:700;color:var(--t)}
.ws{font-size:11px;color:var(--tl);margin-top:1px}
.bsm{padding:6px 10px;border:none;border-radius:8px;cursor:pointer;font-size:14px}
.bsm-o{background:var(--orp);color:var(--or)}
.bsm-r{background:#fdf2f1;color:#c0392b}

.kas-row{display:flex;gap:8px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--b)}
.kas-row:last-child{border-bottom:none}
.kas-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}

.legend-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tm);font-weight:600}
.leg-dot{width:22px;height:17px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}

.sel-month{width:100%;padding:8px 10px;border:1.5px solid var(--orm);border-radius:var(--rs);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:var(--or);background:rgba(232,101,10,.07);outline:none;font-weight:600}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#1a0e05;color:#fff;padding:10px 20px;border-radius:20px;
  font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:all .3s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── SYNC INDICATOR ── */
.sync-bar{position:fixed;top:0;left:0;right:0;z-index:9999;height:3px;background:transparent;pointer-events:none}
.sync-bar.syncing{background:linear-gradient(90deg,var(--or),#fbbf24,var(--or));background-size:200%;animation:syncAnim 1.2s linear infinite}
@keyframes syncAnim{0%{background-position:0%}100%{background-position:200%}}
.conn-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;flex-shrink:0}
.conn-dot.online{background:#22c55e;box-shadow:0 0 6px #22c55e}
.conn-dot.offline{background:#f87171;box-shadow:0 0 6px #f87171}
.conn-dot.pending{background:#fbbf24;box-shadow:0 0 6px #fbbf24}
#conn-status{display:flex;align-items:center;font-size:10px;color:#fff;font-weight:600;white-space:nowrap;
  background:rgba(0,0,0,.2);border-radius:8px;padding:3px 8px;gap:3px}
/* ── LOADING SCREEN ── */
#FB-LOAD{position:fixed;inset:0;background:linear-gradient(155deg,#1a0800,#5c1a00,#C2500A);
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:8000;gap:16px}
#FB-LOAD .fl-logo{width:72px;height:72px;border-radius:22px;background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;font-size:38px;color:#fff;
  box-shadow:0 8px 32px rgba(0,0,0,.3)}
#FB-LOAD .fl-title{font-family:'Playfair Display',serif;font-size:26px;color:#fff}
#FB-LOAD .fl-sub{font-size:13px;color:rgba(255,255,255,.7)}
.fl-spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);
  border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.fl-err{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
  border-radius:12px;padding:12px 18px;color:#fff;font-size:12px;text-align:center;max-width:280px;line-height:1.6}
.fl-err code{background:rgba(255,255,255,.2);border-radius:4px;padding:2px 6px;font-size:11px;display:block;margin-top:6px;word-break:break-all}

.btn-print{display:flex;align-items:center;gap:6px;padding:8px 14px;
  background:#1a0e05;color:#fff;border:none;border-radius:8px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;white-space:nowrap}
.btn-print:active{opacity:.8}
@media print{body,html{display:block!important}#LS,#APP,#MO,#TOAST{display:none!important}
  #PRINT-FRAME{display:block!important;position:static!important}}
</style>
</head>
<body>

<!-- Firebase Loading Screen -->
<div id="FB-LOAD">
  <div class="fl-logo"><i class="ti ti-plant-2"></i></div>
  <div class="fl-title">Wawan Bunga</div>
  <div class="fl-sub" id="fl-sub">Menghubungkan ke server...</div>
  <div class="fl-spinner" id="fl-spin"></div>
  <div class="fl-err" id="fl-err" style="display:none"></div>
</div>

<!-- Sync progress bar -->
<div class="sync-bar" id="SYNC-BAR"></div>

<h2 style="position:absolute;left:-9999px">Wawan Bunga — Manajemen Kebun</h2>

<div id="LS">
  <div class="lc">
    <div class="ll">
      <div class="ll-logo"><i class="ti ti-plant-2" aria-hidden="true"></i></div>
      <h1>Wawan Bunga 🌸</h1>
      <p>buku pencatatan kebun bunga</p>
    </div>
    <div class="fg">
      <label>Username</label>
      <input class="fi" id="l-user" type="text" placeholder="Masukkan username">
    </div>
    <div class="fg">
      <label>Password</label>
      <div style="position:relative">
        <input class="fi" id="l-pass" type="password" placeholder="Masukkan password" style="padding-right:44px">
        <button type="button" onclick="togglePassVis()" id="btn-eye"
          style="position:absolute;right:0;top:0;bottom:0;width:42px;background:none;border:none;
            cursor:pointer;display:flex;align-items:center;justify-content:center;
            color:var(--tl);font-size:18px;border-radius:0 var(--rs) var(--rs) 0"
          aria-label="Lihat password">
          <i class="ti ti-eye" id="eye-icon"></i>
        </button>
      </div>
    </div>
    <div class="lerr" id="lerr">Username atau password salah</div>
    <button class="btn-login" onclick="doLogin()">Masuk</button>
    <div class="demo-hint"><span style="color:#C2500A;font-weight:700">⚠️ pastikan berada dalam jaringan saat login!!</span></div>
  </div>
</div>

<div id="APP">
  <div class="tb">
    <div class="tb-left">
      <button class="tb-back" id="btn-back" onclick="goBack()" style="display:none" aria-label="Kembali"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
      <div class="tb-logo" id="tb-logo" aria-hidden="true"><i class="ti ti-plant-2"></i></div>
      <div>
        <div class="tb-title" id="tb-title">Wawan Bunga</div>
        <div class="tb-sub" id="tb-sub">Selamat datang</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
      <select id="month-sel" onchange="currentMonth=this.value;refreshPage()" style="display:none;position:absolute"></select>
      <div id="conn-status"><span class="conn-dot pending" id="conn-dot"></span><span id="conn-txt">...</span></div>
      <span id="tb-role" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;white-space:nowrap"></span>
      <button class="btn-out" onclick="doLogout()" style="font-size:11px;padding:5px 10px;white-space:nowrap">Keluar</button>
    </div>
  </div>
  <div class="mc" id="MC"></div>
</div>

<div class="mo" id="MO" onclick="closeMO(event)">
  <div class="ms" onclick="event.stopPropagation()">
    <div class="mh"></div>
    <div class="mt" id="mo-title">Input</div>
    <div id="mo-body"></div>
    <div class="mo-btns">
      <button class="btn-cancel" onclick="hideMO()">Batal</button>
      <button class="btn-save" onclick="saveMO()">Simpan</button>
    </div>
  </div>
</div>

<div class="toast" id="TOAST"></div>

<script>
// ══════════════════════════════════════════════════════════
// ── FIREBASE CONFIG — GANTI BAGIAN INI DENGAN CONFIG ANDA ─
// ══════════════════════════════════════════════════════════
const FB_CONFIG = {
  apiKey:            "AIzaSyCv460Mfdel6LW4waHqtScrPYMZrEImdyw",
  authDomain:        "wawanbunga-69251.firebaseapp.com",
  databaseURL:       "https://wawanbunga-69251-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "wawanbunga-69251",
  storageBucket:     "wawanbunga-69251.firebasestorage.app",
  messagingSenderId: "946840645397",
  appId:             "1:946840645397:web:c9ae42d9ca584f091b831c",
  measurementId:     "G-SYMZJNQG1S"
};
// ══════════════════════════════════════════════════════════

// ── FIREBASE ENGINE ───────────────────────────────────────
let db = null;
let fbReady = false;
let isOnline = false;
let pendingWrites = 0; // hitung write yg sedang proses

// Kunci localStorage untuk data offline
const LS_PREFIX = 'wb_offline_';
const LS_QUEUE  = 'wb_queue';   // antrian write saat offline

function fbInit() {
  try {
    const app = firebase.initializeApp(FB_CONFIG);
    db = firebase.database(app);

    // Deteksi online/offline realtime
    db.ref('.info/connected').on('value', snap => {
      isOnline = !!snap.val();
      updateConnUI(isOnline ? 'online' : 'offline');
      if (isOnline) flushOfflineQueue();
    });

    // Load semua data dari Firebase lalu tampilkan app
    fbLoadAll();
  } catch(e) {
    showFbError('Gagal inisialisasi Firebase.<br>Cek config di kode.<br><code>' + e.message + '</code>');
  }
}

function updateConnUI(state) {
  const dot = document.getElementById('conn-dot');
  const txt = document.getElementById('conn-txt');
  if (!dot) return;
  dot.className = 'conn-dot ' + state;
  txt.textContent = state === 'online' ? 'Online' : state === 'offline' ? 'Offline' : '...';
}

function setSyncing(on) {
  const bar = document.getElementById('SYNC-BAR');
  if (!bar) return;
  if (on) bar.classList.add('syncing'); else bar.classList.remove('syncing');
}

// ── LOAD SEMUA DATA DARI FIREBASE ─────────────────────────
function fbLoadAll() {
  setFlSub('Memuat data...');
  db.ref('/').once('value').then(snap => {
    const d = snap.val() || {};

    // USERS — akun pengguna
    if (d.users) {
      USERS.length = 0;
      Object.values(d.users).forEach(u => USERS.push(u));
    } else {
      // Jika belum ada user, buat akun admin default & simpan ke Firebase
      const defaultAdmin = {
        id: 'user_admin',
        name: 'Admin',
        username: 'admin',
        pass: 'admin123',
        role: 'admin'
      };
      USERS.push(defaultAdmin);
      db.ref('/users/user_admin').set(defaultAdmin);
      // Hapus akun lama yg field-nya salah (password → pass)
      db.ref('/users/user_admin/password').remove();
    }

    // Karyawan
    if (d.karyawan) karyawan = Object.values(d.karyawan);

    // Absen & Lembur (object flat)
    if (d.absenData)  absenData  = d.absenData;
    if (d.lemburData) lemburData = d.lemburData;

    // Kas
    if (d.kasData) kasData = d.kasData;

    // Panen
    if (d.panenData) panenData = d.panenData;

    // Obat & Drip
    if (d.obatData) obatData = d.obatData;
    if (d.dripData) dripData = d.dripData;

    // Bunga
    if (d.bunga && Array.isArray(d.bunga)) bunga = d.bunga;

    // Penjualan
    if (d.penjualanData) penjualanData = Array.isArray(d.penjualanData)
      ? d.penjualanData : Object.values(d.penjualanData);

    // Matun
    if (d.matunData) matunData = d.matunData;

    // Jumlah Tanaman
    if (d.jtData)  jtData  = d.jtData;
    if (d.jtSubs)  jtSubs  = d.jtSubs;

    // Plastik UV
    if (d.puvData)  puvData  = d.puvData;
    if (d.puvCells) puvCells = d.puvCells;

    // Setelah load selesai, setup listener realtime & tampilkan app
    fbSetupListeners();
    hideFbLoad();
    fbReady = true;

    // Restore session jika sudah login sebelumnya
    const savedSession = sessionStorage.getItem('wb_session');
    if (savedSession) {
      try {
        const sess = JSON.parse(savedSession);
        const user = USERS.find(x => x.id === sess.id && x.username === sess.username);
        if (user) {
          CU = user;
          currentMonth = todayYM();
          buildMonthSelector();
          document.getElementById('tb-role').textContent = roleLabel[CU.role] || CU.role;
          document.getElementById('LS').style.display = 'none';
          const app = document.getElementById('APP');
          app.style.display = 'flex';
          app.style.flexDirection = 'column';
          app.style.flex = '1';
          app.style.minHeight = '100%';
          navStack = [];
          pushNav({ title: 'Wawan Bunga', sub: 'Selamat datang, ' + CU.name, renderFn: renderHome, showBack: false });
        }
      } catch(e) { sessionStorage.removeItem('wb_session'); }
    }

    // Flush antrian offline jika ada
    if (isOnline) flushOfflineQueue();

  }).catch(e => {
    // Gagal load (mungkin offline saat pertama kali) — coba dari localStorage
    loadFromLocalStorage();
    hideFbLoad();
    fbReady = true;
    showToastWarn('⚠️ Offline — data dari penyimpanan lokal');
  });
}

// ── REALTIME LISTENERS — update otomatis saat HP lain simpan data ──
function fbSetupListeners() {
  const paths = [
    'users','karyawan','absenData','lemburData','kasData',
    'panenData','obatData','dripData','bunga','penjualanData',
    'matunData','jtData','jtSubs','puvData','puvCells'
  ];
  paths.forEach(path => {
    db.ref('/' + path).on('value', snap => {
      if (!fbReady) return; // abaikan event saat initial load
      applyRemoteData(path, snap.val());
    });
  });
}

function applyRemoteData(path, val) {
  if (val === null) return;
  switch(path) {
    case 'users':
      USERS.length = 0;
      Object.values(val).forEach(u => USERS.push(u));
      break;
    case 'karyawan':        karyawan      = Object.values(val); break;
    case 'absenData':       absenData     = val; break;
    case 'lemburData':      lemburData    = val; break;
    case 'kasData':         kasData       = val; break;
    case 'panenData':       panenData     = val; break;
    case 'obatData':        obatData      = val; break;
    case 'dripData':        dripData      = val; break;
    case 'bunga':           bunga         = Array.isArray(val) ? val : Object.values(val); break;
    case 'penjualanData':   penjualanData = Array.isArray(val) ? val : Object.values(val); break;
    case 'matunData':       matunData     = val; break;
    case 'jtData':          jtData        = val; break;
    case 'jtSubs':          jtSubs        = val; break;
    case 'puvData':         puvData       = val; break;
    case 'puvCells':        puvCells      = val; break;
  }
  // Re-render halaman aktif jika sudah login
  if (CU && navStack.length) refreshPage();
}

// ── SIMPAN KE FIREBASE (dengan fallback offline) ──────────
function fbSave(path, data) {
  // Selalu simpan ke localStorage dulu sebagai backup
  try { localStorage.setItem(LS_PREFIX + path, JSON.stringify(data)); } catch(e){}

  if (!db || !isOnline) {
    // Tambahkan ke antrian offline
    enqueueOffline(path, data);
    updateConnUI('offline');
    return Promise.resolve();
  }

  setSyncing(true);
  pendingWrites++;
  return db.ref('/' + path).set(data)
    .then(() => {
      pendingWrites--;
      if (pendingWrites <= 0) { pendingWrites=0; setSyncing(false); }
    })
    .catch(e => {
      pendingWrites--;
      if (pendingWrites <= 0) { pendingWrites=0; setSyncing(false); }
      enqueueOffline(path, data);
      showToastWarn('⚠️ Tersimpan lokal, akan sync saat online');
    });
}

// ── ANTRIAN OFFLINE ───────────────────────────────────────
function enqueueOffline(path, data) {
  let q = [];
  try { q = JSON.parse(localStorage.getItem(LS_QUEUE) || '[]'); } catch(e){}
  // Hapus entri lama untuk path yang sama (pakai data terbaru)
  q = q.filter(x => x.path !== path);
  q.push({ path, data, ts: Date.now() });
  try { localStorage.setItem(LS_QUEUE, JSON.stringify(q)); } catch(e){}
}

function flushOfflineQueue() {
  let q = [];
  try { q = JSON.parse(localStorage.getItem(LS_QUEUE) || '[]'); } catch(e){}
  if (!q.length || !db) return;

  setSyncing(true);
  showToastWarn('🔄 Sinkronisasi data offline...');
  const writes = q.map(item =>
    db.ref('/' + item.path).set(item.data).catch(e => console.warn('flush err', item.path, e))
  );
  Promise.all(writes).then(() => {
    localStorage.removeItem(LS_QUEUE);
    setSyncing(false);
    toast('✅ Data offline berhasil disinkronkan!');
  }).catch(() => {
    setSyncing(false);
    showToastWarn('⚠️ Sebagian data belum tersinkron');
  });
}

// ── LOAD DARI LOCALSTORAGE (fallback saat offline pertama kali) ──
function loadFromLocalStorage() {
  const keys = [
    'users','karyawan','absenData','lemburData','kasData',
    'panenData','obatData','dripData','bunga','penjualanData',
    'matunData','jtData','jtSubs','puvData','puvCells'
  ];
  keys.forEach(k => {
    try {
      const raw = localStorage.getItem(LS_PREFIX + k);
      if (raw) applyRemoteData(k, JSON.parse(raw));
    } catch(e){}
  });
}

let navStack = [];

function pushNav(entry) {
  navStack.push(entry);

  if (navStack.length <= 1) return;
  navStack.pop();
  const entry = navStack[navStack.length - 1];
  applyNav(entry);
}

  if (navStack.length > 1) {
    navStack.pop();
    const entry = navStack[navStack.length - 1];
    applyNav(entry);
    history.pushState({ idx: navStack.length - 1 }, '', '');
  }
});

// Build month selector options dynamically (2 years back to 1 year forward)
function buildMonthSelector() {
  const sel = document.getElementById('month-sel');
  if (!sel) return;
  const now = new Date();
  const opts = [];
  for (let y = now.getFullYear()-1; y <= now.getFullYear()+1; y++) {
    for (let mo = 1; mo <= 12; mo++) {
      const val = `${y}-${String(mo).padStart(2,'0')}`;
      const lbl = `${['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'][mo-1]} ${String(y).slice(2)}`;
      opts.push(`<option value="${val}"${val===currentMonth?' selected':''}>${lbl}</option>`);
    }
  }
  sel.innerHTML = opts.join('');
}

  sessionStorage.removeItem('wb_session');
  document.getElementById('APP').style.display = 'none';
  document.getElementById('LS').style.display = 'flex';
  document.getElementById('lerr').style.display = 'none';

// ── HELPERS ───────────────────────────────────────────────
function getDays(ym) {
  const [y,m] = ym.split('-').map(Number);
  const n = new Date(y,m,0).getDate();
  const r = [];
  for (let d=1;d<=n;d++) r.push({d, day: new Date(y,m-1,d).getDay()});
  return r;
}
function parseTime(v) {
  if (!v) return 0; v = v.toString().trim();
  if (v.includes(':')) { const [h,mn] = v.split(':').map(Number); return (h||0)*60+(mn||0); }
  return parseFloat(v)*60||0;
}
function fmtMins(m) { if (!m) return '-'; const h=Math.floor(m/60),mn=m%60; return mn?`${h}:${String(mn).padStart(2,'0')}`:`${h}:00`; }
function fmtRp(n) { return 'Rp'+Math.round(n||0).toLocaleString('id-ID'); }
function initials(n) { return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function toast(msg) { const t=document.getElementById('TOAST'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function fmtTgl(s) { if(!s) return '-'; const p=s.split('-'); if(p.length<3) return s; return `${parseInt(p[2])} ${monthN[parseInt(p[1])||0]||''} ${p[0]}`; }
function getWeeks(days) {
  const wks=[];let cur=[];
  days.forEach(({d,day})=>{
    if(day===6&&!cur.length){cur=[d];}
    else if(cur.length){cur.push(d);if(day===5){wks.push(cur);cur=[];}}
    else cur=[d];
  });
  if(cur.length)wks.push(cur);
  return wks.length?wks:[days.map(x=>x.d)];
}

// ── ABSENSI ───────────────────────────────────────────────
function renderAbsensi() {
  const days = getDays(currentMonth);
  const [y,m] = currentMonth.split('-').map(Number);
  let html = `<div class="legend-row">
    <div class="leg-item"><div class="leg-dot" style="background:#eff6ff;color:#1D4ED8">I</div>Ijin</div>
    <div class="leg-item"><div class="leg-dot" style="background:#edf7f1;color:#15803D">S</div>Sakit</div>
    <div class="leg-item"><div class="leg-dot" style="background:#fdf2f1;color:#c0392b">A</div>Tanpa Ket</div>
    <div class="leg-item"><div class="leg-dot" style="background:#f5f3ff;color:#9333EA">B</div>Diliburkan</div>
  </div>
  <div style="display:flex;gap:6px;margin-bottom:10px">
    <button class="btn-save" style="flex:1;padding:9px 14px;font-size:13px;border:none;cursor:pointer" onclick="openAbsenBatch()"><i class="ti ti-plus" aria-hidden="true"></i> Input Cepat</button>
    <button class="btn-print" onclick="printAbsensi()"><i class="ti ti-printer"></i> Print</button>
  </div>
  <select onchange="currentMonth=this.value;renderAbsensi()" class="sel-month" style="margin-bottom:10px">
    ${buildMonthOpts(currentMonth)}
  </select>
  <div class="tbl-wrap"><table><thead><tr><th class="td-sticky">Nama</th>`;
  days.forEach(({d,day})=>{const we=day===0||day===6;html+=`<th style="${we?'background:rgba(0,0,0,.25)':''}">${d}<br>${dayN[day]}</th>`;});
  html+=`<th>Jam</th></tr></thead><tbody>`;
  karyawan.forEach((kr,ki)=>{
    let tot=0;
    html+=`<tr><td class="td-sticky" onclick="openAbsenBatch(${ki})" style="cursor:pointer">${kr.nama}</td>`;
    days.forEach(({d,day})=>{
      const k=`${currentMonth}-${ki}-${d}`;
      const v=(absenData[k]||'').toUpperCase();
      const we=day===0||day===6;
      let st=we?'background:#fdf8f5;':'';
      if(absenStyle[v])st+=absenStyle[v];
      if(v&&!absenColors[v])tot+=parseTime(v);
      html+=`<td style="${st};cursor:pointer" onclick="openAbsenModal(${ki},${d},'${k}')">${v||''}</td>`;
    });
    html+=`<td style="font-weight:700;color:var(--or)">${fmtMins(tot)}</td></tr>`;
  });
  html+=`</tbody></table></div>`;
  document.getElementById('MC').innerHTML=html;
}

// Build month <option> list (2 yr back to 1 yr forward), selected = cur
function buildMonthOpts(cur) {
  const lbls = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  let opts='';
  for(let y=2026;y<=2027;y++){
    for(let mo=1;mo<=12;mo++){
      if(y===2026 && mo<5) continue; // mulai Mei 2026
      const val=`${y}-${String(mo).padStart(2,'0')}`;
      opts+=`<option value="${val}"${val===cur?' selected':''}>${lbls[mo-1]} ${y}</option>`;
    }
  }
  return opts;
}

function openAbsenBatch(ki=-1){
  const days=getDays(currentMonth);
  const [y,m]=currentMonth.split('-').map(Number);
  const krOpts=ki>=0
    ?`<div class="info-row"><span style="color:var(--tl)">Karyawan</span><span class="info-val">${karyawan[ki].nama}</span></div>`
    :`<div class="fg2"><label>Karyawan</label><select class="fi2" id="mo-kr">${karyawan.map((k,i)=>`<option value="${i}">${k.nama}</option>`).join('')}</select></div>`;
  moCtx={type:'absen-batch',ki};
  const todayD=new Date().getDate();
  const mm=String(m).padStart(2,'0');
  const minDate=`${y}-${mm}-01`;

// ── GAJI ──────────────────────────────────────────────────
function renderGaji(){
  const days=getDays(currentMonth);const wks=getWeeks(days);const[y,m]=currentMonth.split('-').map(Number);
  // month selector prepend
  let monthSel=`<div style="display:flex;gap:6px;margin-bottom:12px">
    <select onchange="currentMonth=this.value;renderGaji()" class="sel-month" style="flex:1">
      ${buildMonthOpts(currentMonth)}
    </select>
    <button class="btn-print" onclick="printGaji()"><i class="ti ti-printer"></i> Print</button>
  </div>`;

  // Build per-karyawan data: { gP per week, gL per week, total }
  const krData = karyawan.map((kr,ki)=>{
    let totalGaji=0, totalLem=0;
    const weeks = wks.map((wk,wi)=>{
      let tM=0,tL=0;
      wk.forEach(d=>{
        const v=(absenData[`${currentMonth}-${ki}-${d}`]||'').toUpperCase();
        if(v&&!absenColors[v])tM+=parseTime(v);
        tL+=parseInt(lemburData[`L-${currentMonth}-${ki}-${d}`]||0);
      });
      const gP=Math.round(kr.gaji*(tM/480));
      const gL=Math.round(tL*(10000/60));
      totalGaji+=gP+gL; totalLem+=tL;
      return {tM,tL,gP,gL,tot:gP+gL};
    });
    return {kr,ki,weeks,totalGaji,totalLem};
  });

  const wkHeaders = wks.map((wk,i)=>`<th colspan="2" style="text-align:center">Minggu ${i+1}<br><span style="font-weight:400;font-size:9px">${wk[0]}–${wk[wk.length-1]}</span></th>`).join('');
  const wkSubHeaders = wks.map(()=>`<th style="font-size:9px">Pokok</th><th style="font-size:9px">Lembur</th>`).join('');

  let html=`
  <div class="cd" style="padding:0;overflow:hidden">
    <div style="padding:14px 14px 10px;display:flex;justify-content:space-between;align-items:center">
      <div class="ct" style="margin:0"><i class="ti ti-cash" aria-hidden="true"></i>Gaji ${monthN[m]} ${y}</div>
    </div>
    <div class="tbl-wrap">
    <table style="min-width:${320+wks.length*120}px">
      <thead>
        <tr>
          <th rowspan="2" style="text-align:left;min-width:80px">Nama</th>
          <th rowspan="2" style="min-width:90px">Total Bulan</th>
          ${wkHeaders}
        </tr>
        <tr>${wkSubHeaders}</tr>
      </thead>
      <tbody>`;

  let grandTotal=0;
  krData.forEach(({kr,weeks,totalGaji})=>{
    grandTotal+=totalGaji;
    html+=`<tr>
      <td style="font-weight:700">${kr.nama}<br><span class="badge ${kr.tipe==='bulanan'?'b-bl':'b-or'}" style="font-size:9px;margin-top:2px;display:inline-block">${kr.tipe==='bulanan'?'Bln':'Mgg'}</span></td>
      <td style="font-weight:700;color:var(--or);text-align:center">${fmtRp(totalGaji)}</td>
      ${weeks.map(w=>`<td style="text-align:center">${w.gP?fmtRp(w.gP):'-'}</td><td style="text-align:center;color:${w.gL?'#1D4ED8':'var(--tl)'}">${w.gL?fmtRp(w.gL):'-'}</td>`).join('')}
    </tr>`;
  });

  html+=`</tbody>
      <tfoot>
        <tr style="background:var(--orp)">
          <td style="font-weight:700;color:var(--or)">TOTAL</td>
          <td style="font-weight:700;color:var(--or);text-align:center">${fmtRp(grandTotal)}</td>
          ${wks.map((_,wi)=>{
            const wTot=krData.reduce((s,{weeks})=>s+weeks[wi].gP,0);
            const lTot=krData.reduce((s,{weeks})=>s+weeks[wi].gL,0);
            return `<td style="font-weight:700;text-align:center">${fmtRp(wTot)}</td><td style="font-weight:700;text-align:center;color:#1D4ED8">${lTot?fmtRp(lTot):'-'}</td>`;
          }).join('')}
        </tr>
      </tfoot>
    </table>
    </div>
    <div style="padding:10px 14px;font-size:11px;color:var(--tl)">*Lembur = Rp10.000/jam · Gaji pokok = (jam/8jam)×gaji harian</div>
  </div>`;

  document.getElementById('MC').innerHTML=monthSel+html;
}

    const rowTot=bTot.reduce((a,b)=>a+b,0);
    bTot.forEach((v,i)=>grandB[i]+=v);grandTot+=rowTot;
    const rusakT=[1,2,3].map(t=>parseInt(panenData[t]&&panenData[t][`P-${currentMonth}-${t}-${d}-rusak`]||0));
    if(!rowTot&&!rusakT.some(r=>r))return;
    html+=`<tr><td class="td-sticky" style="${we?'background:#fdf8f5;':''}font-weight:600">${d}<br><span style="font-size:9px;color:var(--tl)">${dayN[day]}</span></td>`;
    bTot.forEach(v=>html+=`<td style="${v?'color:var(--or)':''}">${v||''}</td>`);
    html+=`<td style="font-weight:700;color:var(--or)">${rowTot||''}</td>`;
    rusakT.forEach(r=>html+=`<td style="${r?'color:#c0392b':''}">${r||''}</td>`);
    html+=`</tr>`;
  });
  html+=`<tr style="background:var(--orp)"><td class="td-sticky" style="font-weight:700;background:var(--orp)">Total</td>`;
  grandB.forEach(v=>html+=`<td style="font-weight:700;color:var(--or)">${v||''}</td>`);
  html+=`<td style="font-weight:700;color:var(--or)">${grandTot||''}</td><td></td><td></td><td></td></tr>`;
  html+=`</tbody></table></div></div>`;
  document.getElementById('MC').innerHTML=html;
}

    return parseInt(p[0])===y && parseInt(p[1])===m;
  });
  const totalBulan = rows.reduce((s,r)=>s+(parseFloat(r.jumlah||0)*parseFloat(r.harga||0)),0);
  const bungaOpts = `<option value="">-- Pilih Bunga --</option>${bunga.map(b=>`<option value="${b}">${b}</option>`).join('')}`;

  let html=`
  <div style="display:flex;gap:6px;margin-bottom:8px">
    <button class="btn-save" style="flex:1;padding:9px 14px;font-size:13px;border:none;cursor:pointer" onclick="openPenjualanMO(-1)">
      <i class="ti ti-plus" aria-hidden="true"></i> Tambah
    </button>
    <button class="btn-print" onclick="printPenjualan()"><i class="ti ti-printer"></i> Print</button>
  </div>
  <select onchange="currentMonth=this.value;renderPenjualan()" class="sel-month" style="margin-bottom:8px">
    ${buildMonthOpts(currentMonth)}
  </select>
  <div style="background:var(--orp);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
    <div style="font-size:11px;font-weight:700;color:var(--tl);text-transform:uppercase">Total Penjualan ${monthN[m]} ${y}</div>
    <div style="font-size:20px;font-weight:700;color:var(--or)">${fmtRp(totalBulan)}</div>
  </div>`;

  if(!rows.length){
    html+=`<div class="cd" style="text-align:center;padding:20px;color:var(--tl)">Belum ada data penjualan bulan ini</div>`;
  } else {
    rows.forEach((r,i)=>{
      const ai = penjualanData.indexOf(r);
      const total = parseFloat(r.jumlah||0)*parseFloat(r.harga||0);
      html+=`<div class="cd" style="padding:8px 10px">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="font-size:11px;font-weight:700;color:var(--or);white-space:nowrap">Tanggal: ${fmtTgl(r.tgl)}</span>
          ${r.nama?`<span style="font-size:11px;color:var(--tm)">Nama: ${r.nama}</span>`:''}
          ${r.bunga?`<span style="font-size:11px;color:#7C3AED">Bunga: ${r.bunga}</span>`:''}
          ${r.jumlah?`<span style="font-size:11px;color:var(--tl)">Jumlah: ${r.jumlah} tangkai</span>`:''}
          ${r.harga?`<span style="font-size:11px;color:var(--tl)">Harga: ${fmtRp(r.harga)}</span>`:''}
          ${total?`<span style="font-size:11px;font-weight:700;color:#1a6b3c">Penjualan: ${fmtRp(total)}</span>`:''}
          <span style="margin-left:auto;display:flex;gap:4px;flex-shrink:0">
            <button class="bsm bsm-o" style="padding:4px 8px;font-size:11px" onclick="openPenjualanMO(${ai})" aria-label="Edit"><i class="ti ti-edit" aria-hidden="true"></i></button>
            <button class="bsm bsm-r" style="padding:4px 8px;font-size:11px" onclick="penjualanData.splice(${ai},1);savePenjualan();renderPenjualan()" aria-label="Hapus"><i class="ti ti-trash" aria-hidden="true"></i></button>
          </span>
        </div>
      </div>`;
    });
  }
  document.getElementById('MC').innerHTML = html;
}

function openPenjualanMO(idx){
  const isEdit = idx>=0;
  const r = isEdit ? (penjualanData[idx]||{}) : {};
  const [y,m] = currentMonth.split('-').map(Number);
  const mm = String(m).padStart(2,'0');
  const todayD = new Date().getDate();
  const defDate = r.tgl||`${y}-${mm}-${String(todayD).padStart(2,'0')}`;
  const bungaOpts = `<option value="">-- Pilih Bunga --</option>${bunga.map(b=>`<option value="${b}"${b===r.bunga?'selected':''}>${b}</option>`).join('')}`;
  moCtx = {type:'jual', idx};
  document.getElementById('mo-title').textContent = isEdit ? 'Edit Penjualan' : 'Tambah Penjualan';
  document.getElementById('mo-body').innerHTML=`
    <div class="fg2"><label>Tanggal</label><input class="fi2" type="date" id="jl-tgl" value="${defDate}"></div>
    <div class="fg2"><label>Nama</label><input class="fi2" type="text" id="jl-nama" placeholder="Nama pembeli / keterangan" value="${r.nama||''}"></div>
    <div class="fg2"><label>Jenis Bunga</label><select class="fi2" id="jl-bunga">${bungaOpts}</select></div>
    <div class="fg2"><label>Jumlah Tangkai</label><input class="fi2" type="number" id="jl-jumlah" placeholder="0" value="${r.jumlah||''}"></div>
    <div class="fg2"><label>Harga Satuan (Rp)</label><input class="fi2" type="number" id="jl-harga" placeholder="0" value="${r.harga||''}"></div>`;
  showMO();
}

// ── MATUN RENDER ──────────────────────────────────────────
function renderMatun(t) {
  const days = getDays(currentMonth);
  const [y,m] = currentMonth.split('-').map(Number);
  const conf = MATUN_CONF[t];
  const setup = bedengSetup[t];
  const np = conf.totalPekerja;
  const hc = conf.hybridCount;

  function getAkumLuas(pi, upToD) {
    let tot=0;
    for(let d=1;d<=upToD;d++) tot+=parseFloat(matunData[t][`MT-${currentMonth}-${t}-${d}-${pi}`]||0);
    return tot;
  }
  function getSisaTotal(upToD) {
    let totAkum=0;
    for(let pi=0;pi<np;pi++) totAkum+=getAkumLuas(pi,upToD);
    return (setup.kapasitas||0)-totAkum;
  }

  const lastD = days[days.length-1].d;
  const sisaTot = getSisaTotal(lastD);
  const kap = setup.kapasitas||0;
  const sisPct = kap>0 ? Math.round((sisaTot/kap)*100) : 0;

  // Build header
  let thPekerja='';
  for(let pi=0;pi<np;pi++){
    const nm=setup.pekerja[pi]?.nama||`P${pi+1}`;
    const isHybrid=pi<hc;
    const cols=isHybrid?3:4;
    thPekerja+=`<th colspan="${cols}" style="background:rgba(124,58,237,.75);min-width:${cols*55}px">${nm}</th>`;
  }

  // Tombol input cepat per pekerja
  const todayD = new Date().getDate();
  const mm = String(m).padStart(2,'0');
  let btnPekerja = '';
  for(let pi=0;pi<np;pi++){
    const nm=setup.pekerja[pi]?.nama||`P${pi+1}`;
    btnPekerja+=`<button onclick="openMatunMO(${t},${pi})"
      style="padding:6px 10px;background:#f5f3ff;border:1.5px solid #ddd6fe;border-radius:8px;
      font-size:12px;font-weight:700;color:#7C3AED;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px">
      <i class="ti ti-plus" style="font-size:13px"></i>${nm}</button>`;
  }

  let html=`
  <div style="margin-bottom:8px">
    <select onchange="currentMonth=this.value;renderMatun(${t})" class="sel-month">
      ${buildMonthOpts(currentMonth)}
    </select>
  </div>
  <div id="matun-sum-${t}" style="background:var(--orp);border-radius:10px;padding:8px 12px;margin-bottom:8px;font-size:11px;display:flex;gap:14px;flex-wrap:wrap">
    <span>Kapasitas: <strong>${kap}</strong></span>
    <span>Sisa Bedeng: <strong style="color:var(--or)">${sisaTot}</strong></span>
    <span>Sisa: <strong style="color:${sisPct<20?'#c0392b':sisPct<50?'#b8820f':'#1a6b3c'}">${sisPct}%</strong></span>
  </div>
  <div style="margin-bottom:8px">
    <div style="font-size:10px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Input Cepat per Pekerja</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">${btnPekerja}</div>
  </div>
  <div class="tbl-wrap"><table style="min-width:${70+np*180}px;table-layout:auto">
  <thead>
    <tr>
      <th class="td-sticky" rowspan="2" style="min-width:46px;z-index:3;font-size:9px">Tgl</th>
      ${thPekerja}
      <th rowspan="2" style="min-width:30px;font-size:9px">TOT</th>
      <th rowspan="2" style="min-width:34px;font-size:9px">Sisa%</th>
    </tr>
    <tr>`;
  for(let pi=0;pi<np;pi++){
    const isHybrid=pi<hc;
    html+=`<th style="font-size:9px;background:rgba(124,58,237,.55);min-width:40px">Luas</th>
           <th style="font-size:9px;background:rgba(124,58,237,.55);min-width:75px">Pekerjaan</th>
           <th style="font-size:9px;background:rgba(124,58,237,.55);min-width:75px">Ket</th>`;
    if(!isHybrid){
      html+=`<th style="font-size:9px;background:rgba(124,58,237,.4);min-width:30px">%</th>`;
    }
  }
  html+=`</tr></thead><tbody>`;

  days.forEach(({d,day})=>{
    const we=day===0||day===6;
    let totHarian=0;
    let rowHtml=`<tr>
      <td class="td-sticky" style="${we?'background:#fdf8f5;':''}font-weight:600;font-size:10px;white-space:nowrap">${d}/${m}</td>`;

    for(let pi=0;pi<np;pi++){
      const isHybrid=pi<hc;
      const kLuas=`MT-${currentMonth}-${t}-${d}-${pi}`;
      const kPek=`MT-${currentMonth}-${t}-${d}-${pi}-pek`;
      const kKet=`MT-${currentMonth}-${t}-${d}-${pi}-ket`;
      const luas=parseFloat(matunData[t][kLuas]||0);
      const pek=matunData[t][kPek]||'';
      const ket=matunData[t][kKet]||'';
      totHarian+=luas;

      rowHtml+=`<td style="padding:2px">
        <input type="number" value="${luas||''}" placeholder="0" step="0.1"
          style="width:100%;min-width:36px;border:1px solid var(--b);border-radius:5px;padding:2px 4px;font-size:11px;background:var(--bg);color:var(--t);text-align:center"
          onchange="matunData[${t}]['${kLuas}']=this.value;updateMatunSummary(${t})">
      </td>
      <td style="padding:2px">
        <input type="text" value="${pek.replace(/'/g,"&#39;")}" placeholder="Pekerjaan"
          style="width:100%;min-width:70px;border:1px solid var(--b);border-radius:5px;padding:2px 4px;font-size:11px;background:var(--bg);color:var(--t)"
          onchange="matunData[${t}]['${kPek}']=this.value">
      </td>
      <td style="padding:2px">
        <input type="text" value="${ket.replace(/'/g,"&#39;")}" placeholder="Ket"
          style="width:100%;min-width:70px;border:1px solid var(--b);border-radius:5px;padding:2px 4px;font-size:11px;background:var(--bg);color:var(--t)"
          onchange="matunData[${t}]['${kKet}']=this.value">
      </td>`;

      if(!isHybrid){
        const akum=getAkumLuas(pi,d);
        const luasBag=setup.pekerja[pi]?.luas||0;
        const sisa=luasBag-akum;
        const pct=luasBag>0?Math.round((sisa/luasBag)*100):0;
        rowHtml+=`<td style="font-weight:700;color:${pct<20?'#c0392b':pct<50?'#b8820f':'#1a6b3c'};font-size:10px;text-align:center;min-width:30px">${luasBag?pct+'%':''}</td>`;
      }
    }
    const sisaD=getSisaTotal(d);
    const sisPctD=kap>0?Math.round((sisaD/kap)*100):0;
    rowHtml+=`<td style="font-weight:700;color:var(--or);text-align:center;font-size:11px">${totHarian||''}</td>
              <td style="font-weight:700;color:${sisPctD<20?'#c0392b':sisPctD<50?'#b8820f':'#1a6b3c'};text-align:center;font-size:10px">${kap?sisPctD+'%':''}</td>
              </tr>`;
    html+=rowHtml;
  });

  html+=`</tbody></table></div>`;
  document.getElementById('MC').innerHTML=html;
}

// ── MODAL INPUT MATUN ─────────────────────────────────────
function openMatunMO(t, pi) {
  const [y,m] = currentMonth.split('-').map(Number);
  const mm = String(m).padStart(2,'0');
  const days = getDays(currentMonth);
  const todayD = new Date().getDate();
  const defDate = `${y}-${mm}-${String(todayD).padStart(2,'0')}`;
  const minDate = `${y}-${mm}-01`;
  const maxDate = `${y}-${mm}-${String(days[days.length-1].d).padStart(2,'0')}`;
  const setup = bedengSetup[t];
  const conf = MATUN_CONF[t];
  const nmPekerja = setup.pekerja[pi]?.nama || `Pekerja ${pi+1}`;

  moCtx = {type:'matun', t, pi};
  document.getElementById('mo-title').textContent = `Matun — ${nmPekerja}`;

  // Pre-fill dengan data hari ini jika ada
  const d0 = todayD;
  const kL0 = `MT-${currentMonth}-${t}-${d0}-${pi}`;
  const kP0 = `MT-${currentMonth}-${t}-${d0}-${pi}-pek`;
  const kK0 = `MT-${currentMonth}-${t}-${d0}-${pi}-ket`;

  document.getElementById('mo-body').innerHTML=`
    <div class="info-row">
      <span style="color:var(--tl)">Lokasi</span>
      <span class="info-val" style="color:#7C3AED">${conf.label}</span>
    </div>
    <div class="fg2" style="margin-top:8px"><label>Tanggal</label>
      <input class="fi2" type="date" id="mt-tgl" min="${minDate}" max="${maxDate}" value="${defDate}"
        onchange="prefillMatunFields(${t},${pi},this.value)">
    </div>
    <div class="fg2"><label>Luas (bedeng)</label>
      <input class="fi2" type="number" id="mt-luas" placeholder="0" step="0.1" value="${matunData[t][kL0]||''}">
    </div>
    <div class="fg2"><label>Pekerjaan</label>
      <input class="fi2" type="text" id="mt-pek" placeholder="cth: Matun baris 1-3" value="${matunData[t][kP0]||''}">
    </div>
    <div class="fg2"><label>Keterangan</label>
      <input class="fi2" type="text" id="mt-ket" placeholder="Keterangan tambahan" value="${matunData[t][kK0]||''}">
    </div>`;
  showMO();
}

function prefillMatunFields(t, pi, tglVal) {
  const d = tglVal ? parseInt(tglVal.split('-')[2]) : 0;
  if(!d) return;
  const kL = `MT-${currentMonth}-${t}-${d}-${pi}`;
  const kP = `MT-${currentMonth}-${t}-${d}-${pi}-pek`;
  const kK = `MT-${currentMonth}-${t}-${d}-${pi}-ket`;
  const el = document.getElementById('mt-luas'); if(el) el.value = matunData[t][kL]||'';
  const ep = document.getElementById('mt-pek');  if(ep) ep.value = matunData[t][kP]||'';
  const ek = document.getElementById('mt-ket');  if(ek) ek.value = matunData[t][kK]||'';
}

// ── UPDATE MATUN SUMMARY (tanpa full re-render) ───────────
function updateMatunSummary(t) {
  const days = getDays(currentMonth);
  const conf = MATUN_CONF[t];
  const setup = bedengSetup[t];
  const np = conf.totalPekerja;
  const hc = conf.hybridCount;
  const kap = setup.kapasitas||0;
  const lastD = days[days.length-1].d;

  function getAkumLuas(pi, upToD) {
    let tot=0;
    for(let d=1;d<=upToD;d++) tot+=parseFloat(matunData[t][`MT-${currentMonth}-${t}-${d}-${pi}`]||0);
    return tot;
  }
  function getSisaTotal(upToD) {
    let totAkum=0;
    for(let pi=0;pi<np;pi++) totAkum+=getAkumLuas(pi,upToD);
    return kap-totAkum;
  }

  const sisaTot = getSisaTotal(lastD);
  const sisPct = kap>0 ? Math.round((sisaTot/kap)*100) : 0;

  // Update summary bar
  const sumEl = document.getElementById(`matun-sum-${t}`);
  if(sumEl) {
    sumEl.innerHTML = `<span>Kapasitas: <strong>${kap}</strong></span>
      <span>Sisa Bedeng: <strong style="color:var(--or)">${sisaTot}</strong></span>
      <span>Sisa: <strong style="color:${sisPct<20?'#c0392b':sisPct<50?'#b8820f':'#1a6b3c'}">${sisPct}%</strong></span>`;
  }
}

function showMO(){document.getElementById('MO').classList.add('show');}
function hideMO(){document.getElementById('MO').classList.remove('show');}
function closeMO(e){if(e.target===document.getElementById('MO'))hideMO();}

function saveMO(){
  const mc=moCtx;
  if(mc.type==='absen'){
    const j=document.getElementById('mo-jenis').value;
    const jam=document.getElementById('mo-jam')?document.getElementById('mo-jam').value:'';
    absenData[mc.key]=j==='jam'?jam:j;hideMO();renderAbsensi();saveAbsen();toast('✅ Absen disimpan');
  } else if(mc.type==='absen-batch'){
    const ki=mc.ki>=0?mc.ki:parseInt(document.getElementById('mo-kr').value);
    const tglVal=document.getElementById('mo-tgl').value;
    const d=tglVal?parseInt(tglVal.split('-')[2]):0;
    if(!d){toast('❌ Pilih tanggal dulu');return;}
    const j=document.getElementById('mo-jenis2').value;
    const jam=document.getElementById('mo-jam2')?document.getElementById('mo-jam2').value:'';
    absenData[`${currentMonth}-${ki}-${d}`]=j==='jam'?jam:j;hideMO();renderAbsensi();saveAbsen();toast('✅ Absen disimpan');
  } else if(mc.type==='lembur'){
    lemburData[mc.key]=document.getElementById('mo-lem').value;hideMO();renderLembur();saveLembur();toast('✅ Lembur disimpan');
  } else if(mc.type==='lembur-batch'){
    const ki=mc.ki>=0?mc.ki:parseInt(document.getElementById('mo-kr-l').value);
    const tglVal=document.getElementById('mo-tgl-l').value;
    const d=tglVal?parseInt(tglVal.split('-')[2]):0;
    if(!d){toast('❌ Pilih tanggal dulu');return;}
    lemburData[`L-${currentMonth}-${ki}-${d}`]=document.getElementById('mo-lem-b').value;hideMO();renderLembur();saveLembur();toast('✅ Lembur disimpan');
  } else if(mc.type==='panen'){
    const tglVal=document.getElementById('pn-tgl').value;
    const d=tglVal?parseInt(tglVal.split('-')[2]):moCtx.d;
    if(!d){toast('❌ Pilih tanggal dulu');return;}
    moCtx.d=d;
    bunga.forEach((_,bi)=>{const el=document.getElementById('pn-b-'+bi);if(el)panenData[mc.t][`P-${currentMonth}-${mc.t}-${d}-${bi}`]=el.value;});
    const er=document.getElementById('pn-rusak');if(er)panenData[mc.t][`P-${currentMonth}-${mc.t}-${d}-rusak`]=er.value;
    hideMO();renderPanen(mc.t);savePanen();toast('✅ Panen disimpan');
  } else if(mc.type==='bunga-add'){
    const nm=document.getElementById('bn-nm').value.trim();if(!nm){toast('❌ Nama wajib diisi');return;}
    bunga.push(nm);hideMO();renderJenisBunga();saveBunga();toast('✅ Bunga ditambahkan');
  } else if(mc.type==='bunga-edit'){
    const nm=document.getElementById('bn-nm').value.trim();if(!nm){toast('❌ Nama wajib diisi');return;}
    bunga[mc.i]=nm;hideMO();renderJenisBunga();saveBunga();toast('✅ Bunga diperbarui');
  } else if(mc.type==='kas'){
    const row={tgl:document.getElementById('kas-tgl').value,ket:document.getElementById('kas-ket').value,masuk:parseFloat(document.getElementById('kas-masuk').value)||0,keluar:parseFloat(document.getElementById('kas-keluar').value)||0};
    if(mc.idx>=0){kasData[mc.kas][mc.idx]=row;}else{kasData[mc.kas].push(row);}
    hideMO();renderKas(mc.kas);saveKas();toast(mc.idx>=0?'✅ Transaksi diperbarui':'✅ Transaksi disimpan');
  } else if(mc.type==='obat'||mc.type==='obat-edit'){
    const row={
      tgl:document.getElementById('ob-tgl').value,
      ket:document.getElementById('ob-ket').value,
      vol:document.getElementById('ob-vol').value,
      insek:document.getElementById('ob-insek').value,
      insekDosis:document.getElementById('ob-insekDosis').value,
      fungi:document.getElementById('ob-fungi').value,
      fungiDosis:document.getElementById('ob-fungiDosis').value,
      pdaun:document.getElementById('ob-pdaun').value,
      pdaunDosis:document.getElementById('ob-pdaunDosis').value,
      guntur:document.getElementById('ob-guntur').value,
      gunturDosis:document.getElementById('ob-gunturDosis').value,
    };
    if(mc.type==='obat-edit'){obatData[mc.t][mc.idx]=row;}else{obatData[mc.t].push(row);}
    hideMO();renderObat(mc.t);saveObat();toast(mc.type==='obat-edit'?'✅ Obat diperbarui':'✅ Obat disimpan');
  } else if(mc.type==='drip'||mc.type==='drip-edit'){
    const row={
      tgl:document.getElementById('dr-tgl').value,
      nama:document.getElementById('dr-nama').value,
      blokA:document.getElementById('dr-blokA').value,
      blokB:document.getElementById('dr-blokB').value,
      blokC:document.getElementById('dr-blokC').value,
      zara:document.getElementById('dr-zara').value,
      urea:document.getElementById('dr-urea').value,
      kalsium:document.getElementById('dr-kalsium').value,
      cuci:document.getElementById('dr-cuci').checked
    };
    if(mc.type==='drip-edit'){dripData[mc.t][mc.idx]=row;}else{dripData[mc.t].push(row);}
    hideMO();renderDrip(mc.t);saveDrip();toast(mc.type==='drip-edit'?'✅ Drip diperbarui':'✅ Drip disimpan');
  } else if(mc.type==='jual'){
    const row={
      tgl:document.getElementById('jl-tgl').value,
      nama:document.getElementById('jl-nama').value,
      bunga:document.getElementById('jl-bunga').value,
      jumlah:parseFloat(document.getElementById('jl-jumlah').value)||0,
      harga:parseFloat(document.getElementById('jl-harga').value)||0,
    };
    if(mc.idx>=0){penjualanData[mc.idx]=row;}else{penjualanData.push(row);}
    hideMO();renderPenjualan();savePenjualan();toast(mc.idx>=0?'✅ Penjualan diperbarui':'✅ Penjualan disimpan');
  } else if(mc.type==='matun'){
    const tglVal = document.getElementById('mt-tgl').value;
    const d = tglVal ? parseInt(tglVal.split('-')[2]) : 0;
    if(!d){toast('❌ Pilih tanggal dulu');return;}
    const t=mc.t, pi=mc.pi;
    const kL=`MT-${currentMonth}-${t}-${d}-${pi}`;
    const kP=`MT-${currentMonth}-${t}-${d}-${pi}-pek`;
    const kK=`MT-${currentMonth}-${t}-${d}-${pi}-ket`;
    const luas=document.getElementById('mt-luas').value;
    const pek=document.getElementById('mt-pek').value;
    const ket=document.getElementById('mt-ket').value;
    if(luas) matunData[t][kL]=luas; else delete matunData[t][kL];
    if(pek)  matunData[t][kP]=pek;  else delete matunData[t][kP];
    if(ket)  matunData[t][kK]=ket;  else delete matunData[t][kK];
    hideMO();renderMatun(t);saveMatun();toast('✅ Data matun disimpan');
  } else if(mc.type==='kr-edit'){
    karyawan[mc.ki].gaji=parseInt(document.getElementById('ed-gaji').value)||karyawan[mc.ki].gaji;
    karyawan[mc.ki].tipe=document.getElementById('ed-tipe').value;hideMO();renderKaryawan();saveKaryawan();toast('✅ Karyawan diperbarui');
  } else if(mc.type==='kr-add'){
    const nm=document.getElementById('kr-nm').value.trim();if(!nm){toast('❌ Nama wajib diisi');return;}
    karyawan.push({nama:nm,gaji:parseInt(document.getElementById('kr-gj').value)||0,tipe:document.getElementById('kr-tp').value});
    hideMO();renderKaryawan();saveKaryawan();toast('✅ Karyawan ditambahkan');
  } else if(mc.type==='jt-tambah'){
    const lok=mc.lok;
    const blk=document.getElementById('jt-blk-sel').value;
    const conf=JT_CONF[lok];
    const row={
      id: jtNewId(),
      bdg: document.getElementById('jt-bdg').value,
      warna: document.getElementById('jt-warna').value,
      jTanam: document.getElementById('jt-jtanam').value,
      kacang: conf.hasKacang ? (document.getElementById('jt-kacang')?document.getElementById('jt-kacang').value:'') : '',
      pBedeng: document.getElementById('jt-pbedeng').value,
    };
    if(!jtData[lok][blk]) jtData[lok][blk]=[];
    jtData[lok][blk].push(row);
    hideMO();renderJumlahTanaman(lok);saveJT();toast('✅ Baris ditambahkan');
  } else if(mc.type==='jt-addsub'){
    const lok=mc.lok;
    const blk=document.getElementById('jt-sub-blk').value;
    const pos=jtData[lok][blk].length;
    if(!jtSubs[lok]) jtSubs[lok]={};
    if(!jtSubs[lok][blk]) jtSubs[lok][blk]=[];
    jtSubs[lok][blk].push(pos);
    jtSubs[lok][blk]=[...new Set(jtSubs[lok][blk])].sort((a,b)=>a-b);
    hideMO();renderJumlahTanaman(lok);saveJTSubs();toast('✅ Subtotal ditambahkan');
  } else if(mc.type==='tambah-akun'){
    const name=document.getElementById('ak-name').value.trim();
    const uname=document.getElementById('ak-user').value.trim().toLowerCase();
    const pass=document.getElementById('ak-pass').value;
    const role=document.getElementById('ak-role').value;
    if(!name){toast('❌ Nama wajib diisi');return;}
    if(!uname){toast('❌ Username wajib diisi');return;}
    if(pass.length<4){toast('❌ Password minimal 4 karakter');return;}
    if(USERS.find(x=>x.username===uname)){toast('❌ Username sudah dipakai');return;}
    USERS.push({id:newUserId(),name,role,username:uname,pass});
    hideMO();renderAkunAdmin();saveUsers();toast('✅ Akun ditambahkan');
  } else if(mc.type==='edit-akun'){
    const u=USERS.find(x=>x.id===mc.uid);if(!u)return;
    const isSelf=u.id===CU.id;
    const name=document.getElementById('ak-name').value.trim();
    const uname=document.getElementById('ak-user').value.trim().toLowerCase();
    const pass=document.getElementById('ak-pass').value;
    const roleEl=document.getElementById('ak-role');
    if(!name){toast('❌ Nama wajib diisi');return;}
    if(!uname){toast('❌ Username wajib diisi');return;}
    const dupUser=USERS.find(x=>x.username===uname && x.id!==mc.uid);
    if(dupUser){toast('❌ Username sudah dipakai akun lain');return;}
    if(pass && pass.length<4){toast('❌ Password minimal 4 karakter');return;}
    u.name=name; u.username=uname;
    if(pass) u.pass=pass;
    if(!isSelf && roleEl) u.role=roleEl.value;
    if(isSelf){ CU.name=name; CU.username=uname; if(pass)CU.pass=pass;
      document.getElementById('tb-sub').textContent='Selamat datang, '+CU.name; }
    hideMO();renderAkunAdmin();saveUsers();toast('✅ Akun diperbarui');
  }
} // ── end saveMO ──────────────────────────────────────────

// ── PRINT / PDF ENGINE ────────────────────────────────────
// ══════════════════════════════════════════════════════════
const PX = {
  // CSS dasar untuk semua dokumen print
  base: `<style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',Arial,sans-serif;font-size:10px;color:#1a0e05;background:#fff}
    h1{font-size:15px;font-weight:700;color:#C2500A;margin-bottom:2px}
    h2{font-size:12px;font-weight:700;color:#C2500A;margin-bottom:6px}
    .sub{font-size:9px;color:#7a4020;margin-bottom:10px}
    .header{display:flex;justify-content:space-between;align-items:flex-start;
      border-bottom:2px solid #C2500A;padding-bottom:8px;margin-bottom:10px}
    .header-left{}
    .header-right{text-align:right;font-size:9px;color:#7a4020}
    table{width:100%;border-collapse:collapse;font-size:9px;margin-bottom:10px}
    th{background:#C2500A;color:#fff;padding:4px 5px;text-align:center;font-weight:700;font-size:8px;white-space:nowrap}
    th.l{text-align:left}
    td{padding:3px 5px;border-bottom:1px solid #e8d5c0;font-size:9px}
    td.r{text-align:right}td.c{text-align:center}
    tr:nth-child(even) td{background:#fff8f5}
    tr.total td{background:#FFF3EB;font-weight:700;color:#C2500A}
    .badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:8px;font-weight:700}
    .b-gr{background:#edf7f1;color:#15803D}.b-rd{background:#fef2f2;color:#c0392b}
    .b-or{background:#FFF3EB;color:#C2500A}.b-bl{background:#eff6ff;color:#1D4ED8}
    .summary{background:#FFF3EB;border-radius:6px;padding:6px 10px;margin-bottom:8px;
      display:flex;gap:20px;flex-wrap:wrap;font-size:9px}
    .summary span strong{color:#C2500A}
    .section{margin-bottom:12px}
    .page-break{page-break-after:always}
    .kas-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #e8d5c0;font-size:9px}
    .kas-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    @media print{
      @page{size:A4 landscape;margin:12mm}
      body{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    }
  </style>`,

  open(title, landscape=true) {
    return `<!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>${title}</title>${PX.base}</head>
    <body>`;
  },

  header(judul, sub) {
    const now = new Date();
    const tgl = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()}`;
    return `<div class="header">
      <div class="header-left">
        <h1>🌸 Wawan Bunga</h1>
        <h2>${judul}</h2>
        <div class="sub">${sub}</div>
      </div>
      <div class="header-right">Dicetak: ${tgl}<br>Oleh: ${CU?.name||'-'}</div>
    </div>`;
  },

  close() { return `</body></html>`; },

  doOpen(html) {
    const w = window.open('','_blank','width=900,height=700');
    if(!w){toast('❌ Popup diblokir browser');return;}
    w.document.write(html);
    w.document.close();
    w.onload = ()=>{ w.focus(); w.print(); };
  }
};

// ── PRINT ABSENSI ─────────────────────────────────────────
function printAbsensi() {
  const days = getDays(currentMonth);
  const [y,m] = currentMonth.split('-').map(Number);
  const mn = monthN[m];

  let tHead = `<tr><th class="l" style="min-width:70px">Nama</th>`;
  days.forEach(({d,day})=>{
    const we=day===0||day===6;
    tHead+=`<th style="${we?'background:rgba(0,0,0,.45)':''}min-width:14px">${d}</th>`;
  });
  tHead+=`<th>Jam</th></tr>`;

  const STATUS_CLR={I:'#1D4ED8',S:'#15803D',A:'#c0392b',B:'#9333EA'};
  let tBody='';
  karyawan.forEach((kr,ki)=>{
    let tot=0;
    let row=`<tr><td>${kr.nama}</td>`;
    days.forEach(({d,day})=>{
      const k=`${currentMonth}-${ki}-${d}`;
      const v=(absenData[k]||'').toUpperCase();
      const we=day===0||day===6;
      let bg=we?'background:#f5f5f5;':'';
      let clr='';
      if(STATUS_CLR[v]){bg+=`background:${STATUS_CLR[v]}22;`;clr=`color:${STATUS_CLR[v]};font-weight:700;`;}
      if(v&&!absenColors[v]){tot+=parseTime(v);}
      row+=`<td class="c" style="${bg+clr}font-size:8px">${v||''}</td>`;
    });
    row+=`<td class="c" style="font-weight:700;color:#C2500A">${fmtMins(tot)||'-'}</td></tr>`;
    tBody+=row;
  });

  const html = PX.open(`Absensi ${mn} ${y}`)
    + PX.header(`Absensi Karyawan — ${mn} ${y}`, `Bulan: ${mn} ${y} · Total Karyawan: ${karyawan.length}`)
    + `<div class="summary">
        <span>Bulan: <strong>${mn} ${y}</strong></span>
        <span>Karyawan: <strong>${karyawan.length} orang</strong></span>
        <span>I=Ijin · S=Sakit · A=Tanpa Ket · B=Diliburkan</span>
      </div>
      <table style="font-size:8px"><thead>${tHead}</thead><tbody>${tBody}</tbody></table>`
    + PX.close();
  PX.doOpen(html);
}

// ── PRINT REKAP ───────────────────────────────────────────
function printRekap() {
  const days=getDays(currentMonth);const wks=getWeeks(days);
  const [y,m]=currentMonth.split('-').map(Number); const mn=monthN[m];

  let tHead=`<tr><th class="l">Nama</th><th>Total Jam</th><th>Lembur (mnt)</th><th>Bonus</th>
    ${wks.map((_,i)=>`<th>Mg${i+1}</th>`).join('')}</tr>`;
  let tBody='';
  karyawan.forEach((kr,ki)=>{
    let totJ=0,totL=0;
    const wData=wks.map(wk=>{
      let wJ=0;
      wk.forEach(d=>{
        const v=(absenData[`${currentMonth}-${ki}-${d}`]||'').toUpperCase();
        if(v&&!absenColors[v])wJ+=parseTime(v);
        totL+=parseInt(lemburData[`L-${currentMonth}-${ki}-${d}`]||0);
      });
      totJ+=wJ;return wJ;
    });
    const bonus=totJ/60>=(192/24);
    tBody+=`<tr>
      <td>${kr.nama}</td>
      <td class="c" style="font-weight:700">${fmtMins(totJ)}</td>
      <td class="c">${totL||'-'}</td>
      <td class="c"><span class="badge ${bonus?'b-gr':'b-rd'}">${bonus?'BONUS':'TIDAK'}</span></td>
      ${wData.map(wJ=>`<td class="c">${fmtMins(wJ)||'-'}</td>`).join('')}
    </tr>`;
  });

  const html = PX.open(`Rekap ${mn} ${y}`)
    + PX.header(`Rekap Karyawan — ${mn} ${y}`, `*Bonus jika total jam ≥ 192/24`)
    + `<table><thead>${tHead}</thead><tbody>${tBody}</tbody></table>`
    + PX.close();
  PX.doOpen(html);
}

// ── PRINT GAJI ────────────────────────────────────────────
function printGaji() {
  const days=getDays(currentMonth);const wks=getWeeks(days);
  const [y,m]=currentMonth.split('-').map(Number); const mn=monthN[m];

  const krData=karyawan.map((kr,ki)=>{
    let totalGaji=0;
    const weeks=wks.map(wk=>{
      let tM=0,tL=0;
      wk.forEach(d=>{
        const v=(absenData[`${currentMonth}-${ki}-${d}`]||'').toUpperCase();
        if(v&&!absenColors[v])tM+=parseTime(v);
        tL+=parseInt(lemburData[`L-${currentMonth}-${ki}-${d}`]||0);
      });
      const gP=Math.round(kr.gaji*(tM/480));
      const gL=Math.round(tL*(10000/60));
      totalGaji+=gP+gL;
      return {gP,gL};
    });
    return {kr,weeks,totalGaji};
  });
  const grandTotal=krData.reduce((s,d)=>s+d.totalGaji,0);

  let wkH=wks.map((wk,i)=>`<th colspan="2">Minggu ${i+1} (${wk[0]}-${wk[wk.length-1]})</th>`).join('');
  let wkSub=wks.map(()=>`<th>Pokok</th><th>Lembur</th>`).join('');
  let tBody='';
  krData.forEach(({kr,weeks,totalGaji})=>{
    tBody+=`<tr>
      <td>${kr.nama} <span class="badge ${kr.tipe==='bulanan'?'b-bl':'b-or'}">${kr.tipe==='bulanan'?'Bln':'Mgg'}</span></td>
      <td class="r" style="font-weight:700;color:#C2500A">${fmtRp(totalGaji)}</td>
      ${weeks.map(w=>`<td class="r">${w.gP?fmtRp(w.gP):'-'}</td><td class="r" style="color:#1D4ED8">${w.gL?fmtRp(w.gL):'-'}</td>`).join('')}
    </tr>`;
  });

  const html = PX.open(`Gaji ${mn} ${y}`)
    + PX.header(`Laporan Gaji — ${mn} ${y}`, `*Lembur = Rp10.000/jam · Gaji pokok = (jam/8jam)×gaji harian`)
    + `<div class="summary"><span>Total Bulan: <strong>${fmtRp(grandTotal)}</strong></span>
        <span>Karyawan: <strong>${karyawan.length} orang</strong></span></div>
      <table>
        <thead>
          <tr><th class="l" rowspan="2">Nama</th><th rowspan="2">Total Bulan</th>${wkH}</tr>
          <tr>${wkSub}</tr>
        </thead>
        <tbody>${tBody}</tbody>
        <tfoot>
          <tr class="total">
            <td>TOTAL</td><td class="r">${fmtRp(grandTotal)}</td>
            ${wks.map((_,wi)=>{
              const wT=krData.reduce((s,{weeks})=>s+weeks[wi].gP,0);
              const lT=krData.reduce((s,{weeks})=>s+weeks[wi].gL,0);
              return `<td class="r">${fmtRp(wT)}</td><td class="r">${lT?fmtRp(lT):'-'}</td>`;
            }).join('')}
          </tr>
        </tfoot>
      </table>`
    + PX.close();
  PX.doOpen(html);
}

// ── PRINT LEMBUR ──────────────────────────────────────────
function printLembur() {
  const days=getDays(currentMonth);
  const [y,m]=currentMonth.split('-').map(Number); const mn=monthN[m];

  let tHead=`<tr><th class="l">Nama</th>`;
  days.forEach(({d,day})=>{const we=day===0||day===6;tHead+=`<th style="${we?'background:rgba(0,0,0,.45)':''}font-size:8px">${d}</th>`;});
  tHead+=`<th>Total</th></tr>`;

  let tBody='';
  karyawan.forEach((kr,ki)=>{
    let tot=0;
    let row=`<tr><td>${kr.nama}</td>`;
    days.forEach(({d})=>{
      const k=`L-${currentMonth}-${ki}-${d}`;const v=lemburData[k]||'';
      if(v)tot+=parseInt(v)||0;
      row+=`<td class="c" style="${v?'color:#C2500A;font-weight:700':''}">${v||''}</td>`;
    });
    row+=`<td class="c" style="font-weight:700;color:#C2500A">${tot||'-'}</td></tr>`;
    tBody+=row;
  });

  const html = PX.open(`Lembur ${mn} ${y}`)
    + PX.header(`Lembur Karyawan — ${mn} ${y}`, `Satuan: menit · Rp10.000/jam`)
    + `<table style="font-size:8px"><thead>${tHead}</thead><tbody>${tBody}</tbody></table>`
    + PX.close();
  PX.doOpen(html);
}

// ── PRINT PANEN (3 tempat, 1 halaman) ─────────────────────
function printPanen() {
  const days=getDays(currentMonth);
  const [y,m]=currentMonth.split('-').map(Number); const mn=monthN[m];

  // Rekap gabungan 3 tempat
  let rekapH=`<tr><th class="l">Tanggal</th>
    ${bunga.map(b=>`<th>${b.split(' ')[0]}</th>`).join('')}
    <th>Total</th><th>Rusak T1</th><th>Rusak T2</th><th>Rusak T3</th></tr>`;

  let grandTot=0;const grandB=bunga.map(()=>0);
  let rekapB='';
  days.forEach(({d,day})=>{
    const bTot=bunga.map((_,bi)=>[1,2,3].reduce((s,t)=>s+parseInt(panenData[t]&&panenData[t][`P-${currentMonth}-${t}-${d}-${bi}`]||0),0));
    const rowTot=bTot.reduce((a,b)=>a+b,0);
    bTot.forEach((v,i)=>grandB[i]+=v); grandTot+=rowTot;
    const rusakT=[1,2,3].map(t=>parseInt(panenData[t]&&panenData[t][`P-${currentMonth}-${t}-${d}-rusak`]||0));
    if(!rowTot&&!rusakT.some(r=>r))return;
    const dayStr=['Min','Sen','Sel','Rab','Kam','Jum','Sab'][day];
    rekapB+=`<tr><td>${d} ${dayStr}</td>
      ${bTot.map(v=>`<td class="c" style="${v?'color:#C2500A;font-weight:700':''}">${v||''}</td>`).join('')}
      <td class="c" style="font-weight:700;color:#C2500A">${rowTot||''}</td>
      ${rusakT.map(r=>`<td class="c" style="${r?'color:#c0392b':''}">${r||''}</td>`).join('')}
    </tr>`;
  });
  rekapB+=`<tr class="total"><td>TOTAL</td>
    ${grandB.map(v=>`<td class="c">${v||''}</td>`).join('')}
    <td class="c">${grandTot}</td><td></td><td></td><td></td></tr>`;

  // Detail per tempat
  const LOKNM=['','Tempat 1','Tempat 2','Tempat 3'];
  let detailHtml='';
  [1,2,3].forEach(t=>{
    let tH=`<tr><th class="l">Tanggal</th>${bunga.map(b=>`<th>${b.split(' ')[0]}</th>`).join('')}<th>Total</th><th>Rusak</th></tr>`;
    let tB=''; let tot=0;
    days.forEach(({d,day})=>{
      const bV=bunga.map((_,bi)=>parseInt(panenData[t]&&panenData[t][`P-${currentMonth}-${t}-${d}-${bi}`]||0));
      const rowT=bV.reduce((a,b)=>a+b,0);
      const rk=parseInt(panenData[t]&&panenData[t][`P-${currentMonth}-${t}-${d}-rusak`]||0);
      if(!rowT&&!rk)return;
      tot+=rowT;
      const dayStr=['Min','Sen','Sel','Rab','Kam','Jum','Sab'][day];
      tB+=`<tr><td>${d} ${dayStr}</td>
        ${bV.map(v=>`<td class="c" style="${v?'color:#C2500A':''}">${v||''}</td>`).join('')}
        <td class="c" style="font-weight:700;color:#C2500A">${rowT||''}</td>
        <td class="c" style="${rk?'color:#c0392b':''}">${rk||''}</td></tr>`;
    });
    detailHtml+=`<div class="section"><h2 style="color:#15803D;margin-bottom:4px">📍 ${LOKNM[t]} — Total: ${tot} tangkai</h2>
      <table><thead>${tH}</thead><tbody>${tB||`<tr><td colspan="${bunga.length+3}" style="text-align:center;color:#999;padding:8px">Belum ada data</td></tr>`}</tbody></table>
    </div>`;
  });

  const html = PX.open(`Panen ${mn} ${y}`)
    + PX.header(`Laporan Panen — ${mn} ${y}`, `Total seluruh tempat: ${grandTot} tangkai`)
    + `<div class="section">
        <h2>📊 Rekap Gabungan 3 Tempat</h2>
        <table><thead>${rekapH}</thead><tbody>${rekapB}</tbody></table>
      </div>
      <div class="page-break"></div>`
    + detailHtml
    + PX.close();
  PX.doOpen(html);
}

// ── PRINT KAS ─────────────────────────────────────────────
function printKas(tp) {
  const [y,m]=currentMonth.split('-').map(Number); const mn=monthN[m];
  const allRows=kasData[tp]||[];
  const rows=allRows.filter(r=>{
    if(!r.tgl)return false;
    const p=r.tgl.split('-');
    return p.length===3?parseInt(p[0])===y&&parseInt(p[1])===m:true;
  });
  const nm=tp==='kebun'?'Buku Harian Kebun':'Kas Rumah';
  const totalMasuk=rows.reduce((s,r)=>s+(r.masuk||0),0);
  const totalKeluar=rows.reduce((s,r)=>s+(r.keluar||0),0);
  const saldo=totalMasuk-totalKeluar;

  let saldo_run=0;
  let tBody=rows.map(r=>{
    const masuk=r.masuk||0,keluar=r.keluar||0;
    saldo_run+=masuk-keluar;
    const tglTxt=r.tgl?r.tgl.split('-')[2]+'/'+r.tgl.split('-')[1]:'-';
    return `<tr>
      <td>${tglTxt}</td>
      <td>${r.ket||'-'}</td>
      <td class="r" style="color:#15803D">${masuk?fmtRp(masuk):''}</td>
      <td class="r" style="color:#c0392b">${keluar?fmtRp(keluar):''}</td>
      <td class="r" style="font-weight:700;color:${saldo_run>=0?'#15803D':'#c0392b'}">${fmtRp(saldo_run)}</td>
    </tr>`;
  }).join('');

  const html = PX.open(`${nm} ${mn} ${y}`)
    + PX.header(`${nm} — ${mn} ${y}`, ``)
    + `<div class="summary">
        <span>Pemasukan: <strong style="color:#15803D">${fmtRp(totalMasuk)}</strong></span>
        <span>Pengeluaran: <strong style="color:#c0392b">${fmtRp(totalKeluar)}</strong></span>
        <span>Saldo: <strong>${fmtRp(saldo)}</strong></span>
      </div>
      <table>
        <thead><tr><th class="l">Tanggal</th><th class="l">Keterangan</th><th>Masuk</th><th>Keluar</th><th>Saldo</th></tr></thead>
        <tbody>${tBody}</tbody>
        <tfoot><tr class="total">
          <td colspan="2">TOTAL</td>
          <td class="r" style="color:#15803D">${fmtRp(totalMasuk)}</td>
          <td class="r" style="color:#c0392b">${fmtRp(totalKeluar)}</td>
          <td class="r">${fmtRp(saldo)}</td>
        </tr></tfoot>
      </table>`
    + PX.close();
  PX.doOpen(html);
}

    if(!r.tgl)return false;
    const p=r.tgl.split('-');
    return parseInt(p[0])===y&&parseInt(p[1])===m;

  const totalBulan=rows.reduce((s,r)=>s+(parseFloat(r.jumlah||0)*parseFloat(r.harga||0)),0);

  // Rekap per bunga

    rekapBunga[r.bunga].jml+=parseFloat(r.jumlah||0);
    rekapBunga[r.bunga].total+=parseFloat(r.jumlah||0)*parseFloat(r.harga||0);

  let tRekap=Object.entries(rekapBunga).map(([b,v])=>
    `<tr><td>${b}</td><td class="r">${v.jml} tgk</td><td class="r" style="font-weight:700;color:#C2500A">${fmtRp(v.total)}</td></tr>`

            <tbody>${tRekap||`<tr><td colspan="3" style="text-align:center;color:#999">-</td></tr>`}</tbody>
            <tfoot><tr class="total"><td>TOTAL</td><td class="r">${totalTangkai} tgk</td><td class="r">${fmtRp(totalBulan)}</td></tr></tfoot>
          </table>

// Konfigurasi blok per lokasi
// Kalibanger (1): Blok A, B, C  — masing-masing punya BDG,WARNA,J.TANAM,KACANG,P.BEDENG
// Tegalroto  (2): Blok A, B     — sama kolom
// Ngadikerso (3): Blok A1,A2,A3,B — kolom: BDG,WARNA,J.TANAM,P.BEDENG (tanpa KACANG)

const JT_WARNA_OPTS = ['-','MERAH','SALEM','PINK','PUTIH','POP','ORANGE','KUNING','BONGKAR','KACANG','KOSONG','MERAH BR','SALEM BR','PINK BR','PUTIH BR','ORANGE BR','KUNING BR'];

// Struktur data: jtData[lokasi][blok] = [ {bdg, warna, jTanam, kacang, pBedeng}, ... ]
// Baris orange (subtotal) disimpan terpisah: jtSub[lokasi][blok][sectionIdx]
// Section = kelompok baris antara dua baris orange

// Config blok per lokasi
const JT_CONF = {
  1: { nama:'Kalibanger', blok:['A','B','C'], hasKacang:true },
  2: { nama:'Tegalroto',  blok:['A','B'],     hasKacang:true },
  3: { nama:'Ngadikerso', blok:['A1','A2','A3','B'], hasKacang:false },
};

// Data storage: jtData[lok][blok] = array of rows
// row = {id, bdg, warna, jTanam, kacang, pBedeng}
// jtSubs[lok][blok] = array of subtotal-row positions (index after which subtotal appears)
// Subtotal rows are NOT stored as data rows, they are computed

let jtData = {
  1: { A:[], B:[], C:[] },
  2: { A:[], B:[] },
  3: { A1:[], A2:[], A3:[], B:[] },
};

// Positions of subtotal (orange) rows per blok: array of row-count values
// e.g. jtSubs[1]['A'] = [18, 33] means subtotal after row 18, after row 33 (last)
let jtSubs = {
  1: { A:[18,33], B:[18,33], C:[18,33] },
  2: { A:[18,33], B:[18,33] },
  3: { A1:[12,33], A2:[12,33], A3:[12,33], B:[18,33] },
};

let jtNextId = 1;
function jtNewId(){ return jtNextId++; }

// ── HELPERS ───────────────────────────────────────────────
function jtCompute(rows) {
  // Hitung total dari array rows
  let totJ=0, totK=0, totP=0, totB=0;
  rows.forEach(r => {
    totJ += parseFloat(r.jTanam||0);
    totK += parseFloat(r.kacang||0);
    totP += parseFloat(r.pBedeng||0);
    totB += parseFloat(r.bdg||0);
  });
  return {totJ, totK, totP, totB};
}

function jtComputeSection(rows, from, to) {
  // rows dari index from (inklusif) s.d. to (eksklusif)
  return jtCompute(rows.slice(from, to));
}

}

function renderJumlahTanaman(lok) {
  const conf = JT_CONF[lok];
  const hasK = conf.hasKacang;

  conf.blok.forEach(blk => {
    if (!jtData[lok][blk]) jtData[lok][blk] = [];
    if (!jtSubs[lok]) jtSubs[lok] = {};
    if (!jtSubs[lok][blk]) jtSubs[lok][blk] = [18, 33];
  });

  let html = `
  <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
    <button class="btn-save" style="padding:8px 14px;font-size:12px;border:none;cursor:pointer;background:linear-gradient(135deg,#1a6b3c,#1a8a4c);flex:1;min-width:110px"
      onclick="jtTambahBaris(${lok})">
      <i class="ti ti-plus"></i> Tambah Baris
    </button>
    <button class="btn-save" style="padding:8px 14px;font-size:12px;border:none;cursor:pointer;background:#f97316;flex:1;min-width:110px"
      onclick="jtTambahSubtotal(${lok})">
      <i class="ti ti-sum"></i> + Subtotal
    </button>
    <button class="btn-print" style="flex:1;min-width:80px;justify-content:center" onclick="jtPrint(${lok})"><i class="ti ti-printer"></i> Print</button>
  </div>
  <div style="font-size:11px;color:var(--tl);margin-bottom:10px;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:6px 10px">
    💡 Baris <span style="background:#f97316;color:#fff;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:700">ORANGE</span> = subtotal. Gunakan <strong>+B</strong> untuk sisip baris & <strong>+S</strong> untuk sisip subtotal di bawah baris mana saja.
  </div>

  <!-- Tabel semua blok side-by-side -->
  <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;border:1.5px solid #e0d0c0">
    <div id="jt-tbl-wrap-${lok}">
      ${jtBuildAllBloksTable(lok, conf, hasK)}

  html += jtBuildRekap(lok, conf, hasK);
