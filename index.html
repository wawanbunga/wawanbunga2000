function jtBuildAllBloksTable(lok, conf, hasK) {
  // Build one wide table with all bloks side-by-side
  const bloks = conf.blok;
  const colors = ['#1a6b3c','#1a5c8a','#7C3AED','#b8820f'];
  // Tinggi baris dikurangi: padding 3px (dari 5-6px)
  const inpS = 'width:100%;border:1.5px solid #e0d0c0;border-radius:5px;padding:3px 3px;font-size:11px;text-align:center;background:#fff;color:#1a0e05;min-width:34px';
  const tdBase = 'padding:3px 4px;font-size:11px;border-bottom:1px solid #ecddd0;vertical-align:middle';

  // Compute sequences per blok
  // seqs item: {type:'data'|'sub', dataIdx?, from?, to?, subIdx, afterDataIdx}
  const seqs = {};
  bloks.forEach(blk => {
    const data = jtData[lok][blk] || [];
    const subs = (jtSubs[lok][blk] || []).slice().sort((a,b)=>a-b);
    const seq = [];
    let prev = 0;
    subs.forEach((pos, si) => {
      for(let i=prev; i<pos && i<data.length; i++) {
        seq.push({type:'data', dataIdx:i, blk, subIdx:si});
      }
      seq.push({type:'sub', from:prev, to:pos, blk, subIdx:si});
      prev = pos;
    });
    // data rows after last subtotal (or all if no subs)
    for(let i=prev; i<data.length; i++) {
      seq.push({type:'data', dataIdx:i, blk, subIdx:subs.length});
    }
    seqs[blk] = seq;
  });

  const maxRows = Math.max(...bloks.map(blk => seqs[blk].length), 1);

  // Header row 1: blok names spanning columns
  // +1 col for hapus, +1 col for sisip actions
  const colsPerBlok = hasK ? 5 : 4;
  const totalColsPerBlok = colsPerBlok + 2; // +hapus +sisip

  let thRow1 = '<tr>';
  bloks.forEach((blk, bi) => {
    const c = colors[bi % colors.length];
    // Header blok: padding lebih kecil
    thRow1 += `<th colspan="${totalColsPerBlok}" style="background:${c};color:#fff;padding:5px 6px;font-size:11px;font-weight:700;text-align:center;border-right:3px solid #fff">BLOK ${blk}</th>`;
  });
  thRow1 += '</tr>';

  // Header row 2: column names per blok
  let thRow2 = '<tr>';
  bloks.forEach((blk, bi) => {
    const c = colors[bi % colors.length];
    const thS = `background:${c}dd;color:#fff;padding:4px 4px;font-size:9px;font-weight:700;text-align:center`;
    thRow2 += `<th style="${thS};min-width:34px">BDG</th>`;
    thRow2 += `<th style="${thS};min-width:82px;text-align:left">WARNA</th>`; // diperlebar
    thRow2 += `<th style="${thS};min-width:42px">J.TANAM</th>`;
    if(hasK) thRow2 += `<th style="${thS};min-width:42px">KACANG</th>`;
    thRow2 += `<th style="${thS};min-width:42px">P.BEDENG</th>`;
    thRow2 += `<th style="${thS};width:22px"></th>`; // hapus
    thRow2 += `<th style="${thS};width:44px;border-right:3px solid #fff">+</th>`; // sisip
  });
  thRow2 += '</tr>';

  // Tombol sisip — muncul di tiap baris, tergantung konteks
  // Pada baris DATA: bisa tambah baris bawah (+B) atau tambah subtotal bawah (+S)
  // Pada baris SUBTOTAL: bisa tambah baris bawah (+B) atau tambah subtotal bawah (+S)
  function sisipBtn(lok, blk, afterDataIdx, afterSubIdx) {
    // afterDataIdx = index data array, sisip setelah baris ini
    // afterSubIdx  = subtotal array index untuk geser
    return `<div style="display:flex;flex-direction:column;gap:2px;align-items:center">
      <button onclick="jtSisipBaris(${lok},'${blk}',${afterDataIdx})"
        style="background:#edf7f1;border:1px solid #b2d8c2;border-radius:4px;color:#1a6b3c;cursor:pointer;padding:1px 5px;font-size:10px;font-weight:700;line-height:1.4;width:36px" title="Tambah baris di bawah">+B</button>
      <button onclick="jtSisipSubtotal(${lok},'${blk}',${afterDataIdx})"
        style="background:#fff7ed;border:1px solid #fed7aa;border-radius:4px;color:#f97316;cursor:pointer;padding:1px 5px;font-size:10px;font-weight:700;line-height:1.4;width:36px" title="Tambah subtotal di bawah">+S</button>
    </div>`;
  }

  // Body rows
  let bodyHtml = '';
  for(let ri = 0; ri < maxRows; ri++) {
    const even = ri % 2 === 0;
    let row = '<tr>';
    bloks.forEach((blk, bi) => {
      const borderRight = 'border-right:3px solid #e0d0c0';
      const rowBg = even ? '' : 'background:#fdf8f5';
      const item = seqs[blk][ri];
      const data = jtData[lok][blk] || [];

      if(!item) {
        const empty = `${tdBase};${borderRight}`;
        for(let c=0; c<totalColsPerBlok; c++) row += `<td style="${empty};background:transparent;border-bottom:none"></td>`;
      } else if(item.type === 'sub') {
        const secRows = data.slice(item.from, item.to);
        const {totJ,totK,totP,totB} = jtCompute(secRows);
        const ss = `background:#f97316;color:#fff;font-weight:700;font-size:11px;padding:4px 4px;text-align:center;border:none`;
        row += `<td style="${ss}">${totB||'-'}</td>`;
        row += `<td style="${ss};text-align:left;font-size:10px;letter-spacing:.5px">SUBTOTAL</td>`;
        row += `<td style="${ss}">${totJ||'-'}</td>`;
        if(hasK) row += `<td style="${ss}">${totK||'-'}</td>`;
        row += `<td style="${ss}">${totP||'-'}</td>`;
        // hapus subtotal
        row += `<td style="${ss}"><button onclick="jtHapusSubtotal(${lok},'${blk}',${item.subIdx})"
          style="background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.5);border-radius:5px;color:#fff;cursor:pointer;padding:1px 5px;font-size:11px;line-height:1">✕</button></td>`;
        // sisip setelah subtotal: afterDataIdx = item.to (posisi setelah subtotal dalam data)
        row += `<td style="${ss};${borderRight}">${sisipBtn(lok, blk, item.to, item.subIdx)}</td>`;
      } else {
        const di = item.dataIdx;
        const r = data[di];
        const wSel = `<select style="width:100%;border:1.5px solid #e0d0c0;border-radius:5px;padding:2px 3px;font-size:11px;background:#fff;color:#1a0e05"
          onchange="jtSetField(${lok},'${blk}',${di},'warna',this.value)">
          ${JT_WARNA_OPTS.map(w=>`<option value="${w}"${w===(r.warna||'-')?'selected':''}>${w}</option>`).join('')}
        </select>`;
        row += `<td style="${tdBase};${rowBg};text-align:center"><input type="number" value="${r.bdg||''}" placeholder="-" style="${inpS}" onchange="jtSetField(${lok},'${blk}',${di},'bdg',this.value)"></td>`;
        row += `<td style="${tdBase};${rowBg}">${wSel}</td>`;
        row += `<td style="${tdBase};${rowBg};text-align:center"><input type="number" value="${r.jTanam||''}" placeholder="0" style="${inpS}" onchange="jtSetField(${lok},'${blk}',${di},'jTanam',this.value)"></td>`;
        if(hasK) row += `<td style="${tdBase};${rowBg};text-align:center"><input type="number" value="${r.kacang||''}" placeholder="0" style="${inpS}" onchange="jtSetField(${lok},'${blk}',${di},'kacang',this.value)"></td>`;
        row += `<td style="${tdBase};${rowBg};text-align:center"><input type="number" value="${r.pBedeng||''}" placeholder="0" style="${inpS}" onchange="jtSetField(${lok},'${blk}',${di},'pBedeng',this.value)"></td>`;
        // hapus baris
        row += `<td style="${tdBase};${rowBg};text-align:center">
          <button onclick="jtHapusBaris(${lok},'${blk}',${di})"
            style="background:#fef2f2;border:1px solid #fecaca;border-radius:5px;color:#c0392b;cursor:pointer;padding:1px 5px;font-size:11px">✕</button>
        </td>`;
        // sisip setelah baris ini: afterDataIdx = di+1
        row += `<td style="${tdBase};${rowBg};${borderRight};text-align:center">${sisipBtn(lok, blk, di+1, item.subIdx)}</td>`;
      }
    });
    row += '</tr>';
    bodyHtml += row;
  }

  // Total row per blok
  let totalRow = '<tr>';
  bloks.forEach((blk, bi) => {
    const {totJ,totK,totP,totB} = jtCompute(jtData[lok][blk]||[]);
    const ts = `background:#FFF3EB;font-weight:700;color:#C2500A;font-size:11px;padding:5px 4px;text-align:center;border-top:2px solid #C2500A`;
    totalRow += `<td style="${ts}">${totB||'-'}</td>`;
    totalRow += `<td style="${ts};text-align:left;letter-spacing:.5px">TOTAL</td>`;
    totalRow += `<td style="${ts}">${totJ||'-'}</td>`;
    if(hasK) totalRow += `<td style="${ts}">${totK||'-'}</td>`;
    totalRow += `<td style="${ts}">${totP||'-'}</td>`;
    totalRow += `<td style="${ts}"></td>`;
    totalRow += `<td style="${ts};border-right:3px solid #e0d0c0"></td>`;
  });
  totalRow += '</tr>';

  return `<table style="width:100%;border-collapse:collapse;min-width:${bloks.length*(hasK?320:255)}px">
    <thead>${thRow1}${thRow2}</thead>
    <tbody>
      ${bodyHtml || `<tr><td colspan="${bloks.length * totalColsPerBlok}" style="text-align:center;color:#bbb;padding:20px;font-size:12px">Belum ada data — klik Tambah Baris</td></tr>`}
      ${totalRow}
    </tbody>
  </table>`;
}

// Sisip baris baru setelah posisi data tertentu, geser subtotal yang terdampak
function jtSisipBaris(lok, blk, afterDataIdx) {
  if(!jtData[lok] || !jtData[lok][blk]) return;
  const newRow = {id:jtNewId(), bdg:'', warna:'-', jTanam:'', kacang:'', pBedeng:''};
  jtData[lok][blk].splice(afterDataIdx, 0, newRow);
  // Geser semua subtotal yang posisinya >= afterDataIdx
  jtSubs[lok][blk] = (jtSubs[lok][blk]||[]).map(s => s >= afterDataIdx ? s+1 : s);
  const conf = JT_CONF[lok];
  const wrap = document.getElementById(`jt-tbl-wrap-${lok}`);
  if(wrap) wrap.innerHTML = jtBuildAllBloksTable(lok, conf, conf.hasKacang);
  const rekapEl = document.getElementById(`jt-rekap-${lok}`);
  if(rekapEl) rekapEl.outerHTML = jtBuildRekap(lok, conf, conf.hasKacang);
  toast('✅ Baris disisipkan');
}

// Sisip subtotal baru setelah posisi data tertentu
function jtSisipSubtotal(lok, blk, afterDataIdx) {
  if(!jtSubs[lok]) jtSubs[lok] = {};
  if(!jtSubs[lok][blk]) jtSubs[lok][blk] = [];
  // Tambah subtotal di posisi afterDataIdx (artinya setelah baris ke afterDataIdx-1)
  const subs = jtSubs[lok][blk].slice();
  subs.push(afterDataIdx);
  jtSubs[lok][blk] = [...new Set(subs)].sort((a,b)=>a-b);
  const conf = JT_CONF[lok];
  const wrap = document.getElementById(`jt-tbl-wrap-${lok}`);
  if(wrap) wrap.innerHTML = jtBuildAllBloksTable(lok, conf, conf.hasKacang);
  const rekapEl = document.getElementById(`jt-rekap-${lok}`);
  if(rekapEl) rekapEl.outerHTML = jtBuildRekap(lok, conf, conf.hasKacang);
  toast('✅ Subtotal disisipkan');
}

function jtHapusSubtotal(lok, blk, subIdx) {
  if(!jtSubs[lok] || !jtSubs[lok][blk]) return;
  const subs = (jtSubs[lok][blk]||[]).slice().sort((a,b)=>a-b);
  subs.splice(subIdx, 1);

  saveJTSubs();

function jtBuildBlokTable(lok, conf, hasK, blk) {
  const data = jtData[lok][blk] || [];
  const subs = (jtSubs[lok][blk] || []).slice().sort((a,b)=>a-b);
  const bi = conf.blok.indexOf(blk);
  const hdrColors = ['#1a6b3c','#1a5c8a','#7C3AED','#b8820f'];
  const hdrBg = hdrColors[bi % hdrColors.length];

  // Build sequence
  const seq = [];
  let prev = 0;
  subs.forEach(pos => {
    for(let i=prev; i<pos && i<data.length; i++) seq.push({type:'data', dataIdx:i});
    seq.push({type:'sub', from:prev, to:pos});
    prev = pos;
  });
  for(let i=prev; i<data.length; i++) seq.push({type:'data', dataIdx:i});

  const thStyle = `padding:9px 8px;font-size:11px;font-weight:700;color:#fff;background:${hdrBg};text-align:center`;
  const tdBase = 'padding:8px 6px;font-size:12px;border-bottom:1px solid #ecddd0;vertical-align:middle';
  const inpS = 'width:100%;border:1.5px solid #e0d0c0;border-radius:6px;padding:6px 5px;font-size:13px;text-align:center;background:#fff;color:#1a0e05';

  let bodyRows = '';
  seq.forEach((item, ri) => {
    const even = ri % 2 === 0;
    const rowBg = even ? '' : 'background:#fdf8f5';

    if(item.type==='sub') {
      const secRows = data.slice(item.from, item.to);
      const {totJ,totK,totP,totB} = jtCompute(secRows);
      const ss = `background:#f97316;color:#fff;font-weight:700;font-size:12px;padding:8px 6px;text-align:center;border:none`;
      bodyRows += `<tr>
        <td style="${ss}">${totB||'-'}</td>
        <td style="${ss};text-align:left;font-size:11px;letter-spacing:.5px">SUBTOTAL</td>
        <td style="${ss}">${totJ||'-'}</td>
        ${hasK ? `<td style="${ss}">${totK||'-'}</td>` : ''}
        <td style="${ss}">${totP||'-'}</td>
        <td style="${ss}"></td>
      </tr>`;
    } else {
      const di = item.dataIdx;
      const r = data[di];
      const wSel = `<select style="width:100%;border:1.5px solid #e0d0c0;border-radius:6px;padding:6px 5px;font-size:13px;background:#fff;color:#1a0e05"
        onchange="jtSetField(${lok},'${blk}',${di},'warna',this.value)">
        ${JT_WARNA_OPTS.map(w=>`<option value="${w}"${w===(r.warna||'-')?'selected':''}>${w}</option>`).join('')}
      </select>`;
      bodyRows += `<tr style="${rowBg}">
        <td style="${tdBase};text-align:center"><input type="number" value="${r.bdg||''}" placeholder="-" style="${inpS}" onchange="jtSetField(${lok},'${blk}',${di},'bdg',this.value)"></td>
        <td style="${tdBase}">${wSel}</td>
        <td style="${tdBase};text-align:center"><input type="number" value="${r.jTanam||''}" placeholder="0" style="${inpS}" onchange="jtSetField(${lok},'${blk}',${di},'jTanam',this.value)"></td>
        ${hasK ? `<td style="${tdBase};text-align:center"><input type="number" value="${r.kacang||''}" placeholder="0" style="${inpS}" onchange="jtSetField(${lok},'${blk}',${di},'kacang',this.value)"></td>` : ''}
        <td style="${tdBase};text-align:center"><input type="number" value="${r.pBedeng||''}" placeholder="0" style="${inpS}" onchange="jtSetField(${lok},'${blk}',${di},'pBedeng',this.value)"></td>
        <td style="${tdBase};text-align:center">
          <button onclick="jtHapusBaris(${lok},'${blk}',${di})"
            style="background:#fef2f2;border:1px solid #fecaca;border-radius:6px;color:#c0392b;cursor:pointer;padding:4px 8px;font-size:13px">✕</button>
        </td>
      </tr>`;
    }
  });

  // Total row
  const {totJ,totK,totP,totB} = jtCompute(data);
  const ts = `background:#FFF3EB;font-weight:700;color:#C2500A;font-size:12px;padding:9px 6px;text-align:center;border-top:2px solid #C2500A`;
  bodyRows += `<tr>
    <td style="${ts}">${totB||'-'}</td>
    <td style="${ts};text-align:left;letter-spacing:.5px">TOTAL</td>
    <td style="${ts}">${totJ||'-'}</td>
    ${hasK ? `<td style="${ts}">${totK||'-'}</td>` : ''}
    <td style="${ts}">${totP||'-'}</td>
    <td style="${ts}"></td>
  </tr>`;

  return `<table style="width:100%;border-collapse:collapse;min-width:${hasK?300:250}px">
    <thead>
      <tr>
        <th style="${thStyle};width:50px">BDG</th>
        <th style="${thStyle};text-align:left">WARNA</th>
        <th style="${thStyle}">J.TANAM</th>
        ${hasK ? `<th style="${thStyle}">KACANG</th>` : ''}
        <th style="${thStyle}">P.BEDENG</th>
        <th style="${thStyle};width:36px"></th>
      </tr>
    </thead>
    <tbody>
      ${bodyRows || `<tr><td colspan="${hasK?6:5}" style="text-align:center;color:#bbb;padding:20px;font-size:12px">Belum ada data — klik Tambah Baris</td></tr>`}
    </tbody>
  </table>`;
}

function jtSetField(lok, blk, idx, field, val) {
  if(!jtData[lok]) return;
  if(!jtData[lok][blk]) return;
  if(!jtData[lok][blk][idx]) return;
  jtData[lok][blk][idx][field] = val;
  const conf = JT_CONF[lok];
  // Re-render tabel semua blok
  const wrap = document.getElementById(`jt-tbl-wrap-${lok}`);
  if(wrap) wrap.innerHTML = jtBuildAllBloksTable(lok, conf, conf.hasKacang);
  // Re-render rekap
  const rekapEl = document.getElementById(`jt-rekap-${lok}`);
  if(rekapEl) rekapEl.outerHTML = jtBuildRekap(lok, conf, conf.hasKacang);
}

function jtHapusBaris(lok, blk, idx) {
  if(!jtData[lok] || !jtData[lok][blk]) return;
  jtData[lok][blk].splice(idx, 1);
  const subs = jtSubs[lok][blk] || [];
  jtSubs[lok][blk] = subs.map(s => s > idx ? Math.max(s-1, 0) : s);
  jtSubs[lok][blk] = [...new Set(jtSubs[lok][blk])];
  renderJumlahTanaman(lok);
  saveJT(); saveJTSubs();
  toast('🗑️ Baris dihapus');
}

// ── REKAP ─────────────────────────────────────────────────
function jtBuildRekap(lok, conf, hasK) {
  // Kumpulkan semua data dari semua blok
  const allRows = [];
  conf.blok.forEach(blk => allRows.push(...(jtData[lok][blk]||[])));

  // Rekap per warna
  const rekapWarna = {};
  JT_WARNA_OPTS.filter(w=>w!=='-').forEach(w => rekapWarna[w] = {jTanam:0, kacang:0});
  allRows.forEach(r => {
    const w = r.warna || '-';
    if(w==='-') return;
    if(!rekapWarna[w]) rekapWarna[w] = {jTanam:0, kacang:0};
    rekapWarna[w].jTanam += parseFloat(r.jTanam||0);
    rekapWarna[w].kacang += parseFloat(r.kacang||0);
  });

  // Total bedeng (jumlah semua bdg yang terisi)
  let totalBedeng = 0;
  allRows.forEach(r => { totalBedeng += parseFloat(r.bdg||0); });

  // Total tanaman & kacang
  let grandJ = 0, grandK = 0;
  Object.values(rekapWarna).forEach(v => { grandJ+=v.jTanam; grandK+=v.kacang; });

  // Hanya tampilkan warna yang ada isinya
  const warnaAda = Object.entries(rekapWarna).filter(([w,v]) => v.jTanam > 0 || v.kacang > 0);

  const rekapRows = warnaAda.map(([w,v]) => `
    <tr>
      <td style="font-size:10px;padding:4px 6px;font-weight:600">${w}</td>
      <td style="text-align:right;font-weight:700;color:#1a6b3c;font-size:10px;padding:4px 6px">${v.jTanam||'-'}</td>
      ${hasK ? `<td style="text-align:right;color:#7C3AED;font-size:10px;padding:4px 6px">${v.kacang||'-'}</td>` : ''}
    </tr>`).join('');

  return `<div id="jt-rekap-${lok}" style="margin-top:12px">
    <div class="sec">Rekap — ${conf.nama}</div>
    <div style="display:inline-flex;align-items:center;gap:8px;background:var(--orp);border:1px solid var(--orm);border-radius:8px;padding:4px 12px;margin-bottom:8px">
      <i class="ti ti-layout-grid" style="font-size:13px;color:var(--or)"></i>
      <span style="font-size:11px;color:var(--tm);font-weight:600">Total Bedeng:</span>
      <span style="font-size:14px;font-weight:800;color:var(--or)">${totalBedeng}</span>
    </div>
    <div class="tbl-wrap" style="border-radius:8px">
      <table style="min-width:160px;border-collapse:collapse">
        <thead>
          <tr>
            <th style="text-align:left;padding:5px 6px;font-size:9px;background:linear-gradient(135deg,#1a6b3c,#2d8a50)">WARNA</th>
            <th style="padding:5px 6px;font-size:9px;text-align:right;background:linear-gradient(135deg,#1a6b3c,#2d8a50)">J.TANAMAN</th>
            ${hasK ? `<th style="padding:5px 6px;font-size:9px;text-align:right;background:linear-gradient(135deg,#1a6b3c,#2d8a50)">KACANG</th>` : ''}
          </tr>
        </thead>
        <tbody>
          ${rekapRows || `<tr><td colspan="${hasK?3:2}" style="text-align:center;color:#999;padding:10px;font-size:11px">Belum ada data</td></tr>`}
        </tbody>
        <tfoot>
          <tr style="background:var(--orp)">
            <td style="font-weight:700;color:var(--or);padding:5px 6px;font-size:10px">TOTAL</td>
            <td style="text-align:right;font-weight:700;color:var(--or);padding:5px 6px;font-size:10px">${grandJ}</td>
            ${hasK ? `<td style="text-align:right;font-weight:700;color:#7C3AED;padding:5px 6px;font-size:10px">${grandK}</td>` : ''}
          </tr>
        </tfoot>
      </table>
    </div>
  </div>`;
}

// ── REKAP GABUNGAN 3 LOKASI ───────────────────────────────
function renderJTRekapGabungan() {
  // Kumpulkan data dari semua 3 lokasi
  const lokasiNama = {1:'Kalibanger', 2:'Tegalroto', 3:'Ngadikerso'};

  function getRekapLokasi(lok) {
    const conf = JT_CONF[lok];
    const allRows = [];
    conf.blok.forEach(blk => allRows.push(...(jtData[lok][blk]||[])));
    const rw = {};
    let totalBedeng = 0, totalJ = 0, totalP = 0;
    allRows.forEach(r => {
      const w = r.warna || '-';
      totalBedeng += parseFloat(r.bdg||0);
      if(w==='-') return;
      if(!rw[w]) rw[w] = {jTanam:0, pBedeng:0};
      rw[w].jTanam += parseFloat(r.jTanam||0);
      rw[w].pBedeng += parseFloat(r.pBedeng||0);
      totalJ += parseFloat(r.jTanam||0);
      totalP += parseFloat(r.pBedeng||0);
    });
    return { rw, totalBedeng, totalJ, totalP };
  }

  const data1 = getRekapLokasi(1);
  const data2 = getRekapLokasi(2);
  const data3 = getRekapLokasi(3);

  // Gabungkan semua warna
  const allWarnas = new Set();
  [data1, data2, data3].forEach(d => Object.keys(d.rw).forEach(w => allWarnas.add(w)));
  const warnas = JT_WARNA_OPTS.filter(w => w!=='-' && allWarnas.has(w));

  // Bangun baris tabel gabungan — J.TANAM
  let rowsJ = '';
  let gt1J=0, gt2J=0, gt3J=0, gtTotalJ=0;
  // Bangun baris tabel gabungan — P.BEDENG
  let rowsP = '';
  let gt1P=0, gt2P=0, gt3P=0, gtTotalP=0;

  warnas.forEach(w => {
    const v1 = data1.rw[w]||{jTanam:0,pBedeng:0};
    const v2 = data2.rw[w]||{jTanam:0,pBedeng:0};
    const v3 = data3.rw[w]||{jTanam:0,pBedeng:0};
    const totalJ = v1.jTanam + v2.jTanam + v3.jTanam;
    const totalP = v1.pBedeng + v2.pBedeng + v3.pBedeng;
    if(!totalJ && !totalP) return;
    gt1J+=v1.jTanam; gt2J+=v2.jTanam; gt3J+=v3.jTanam; gtTotalJ+=totalJ;
    gt1P+=v1.pBedeng; gt2P+=v2.pBedeng; gt3P+=v3.pBedeng; gtTotalP+=totalP;
    rowsJ += `<tr>
      <td style="font-size:10px;padding:4px 6px;font-weight:600">${w}</td>
      <td style="text-align:right;font-size:10px;padding:4px 6px;color:#1a6b3c;font-weight:600">${v1.jTanam||'-'}</td>
      <td style="text-align:right;font-size:10px;padding:4px 6px;color:#1D4ED8;font-weight:600">${v2.jTanam||'-'}</td>
      <td style="text-align:right;font-size:10px;padding:4px 6px;color:#7C3AED;font-weight:600">${v3.jTanam||'-'}</td>
      <td style="text-align:right;font-size:10px;padding:4px 6px;font-weight:800;color:var(--or)">${totalJ||'-'}</td>
    </tr>`;
    rowsP += `<tr>

// ── PRINT JUMLAH TANAMAN ─────────────────────────────────
function jtPrint(lok) {
  const conf = JT_CONF[lok];
  const hasK = conf.hasKacang;
  const bloks = conf.blok;

  let thHtml = `<tr>`;
  bloks.forEach((blk,bi) => {
    const cols = hasK ? 5 : 4;
    thHtml += `<th colspan="${cols}" style="background:${bi%2===0?'#1a6b3c':'#2d8a50'}">BLOK ${blk}</th>`;
    if(bi<bloks.length-1) thHtml+=`<th style="width:4px;background:#fff;border:none"></th>`;
  });
  thHtml += `</tr><tr>`;
  bloks.forEach((blk,bi) => {
    thHtml += `<th>BDG</th><th>WARNA</th><th>J.TANAM</th>`;
    if(hasK) thHtml+=`<th>KACANG</th>`;
    thHtml+=`<th>P.BEDENG</th>`;
    if(bi<bloks.length-1) thHtml+=`<th style="width:4px;background:#fff;border:none"></th>`;
  });
  thHtml += `</tr>`;

  // Build body
  const blkState2 = {};
  bloks.forEach(blk => {
    blkState2[blk] = { dataIdx: 0, subShown: 0 };
  });
  const blkDispLen2 = {};
  bloks.forEach(blk => {
    blkDispLen2[blk] = jtData[lok][blk].length + (jtSubs[lok][blk]||[]).length;
  });
  const totalDispRows2 = Math.max(...Object.values(blkDispLen2), 1);

  let bodyHtml = '';
  for(let dispR=0; dispR<totalDispRows2; dispR++) {
    let row = `<tr>`;
    bloks.forEach((blk,bi) => {
      const state = blkState2[blk];
      const data = jtData[lok][blk];
      const subsArr = (jtSubs[lok][blk]||[]).slice().sort((a,b)=>a-b);
      const subIdx = state.subShown < subsArr.length ? subsArr[state.subShown] : Infinity;
      const isSubRow = (state.dataIdx >= subIdx && state.subShown < subsArr.length);

      if(isSubRow) {
        const prevSub = state.subShown > 0 ? subsArr[state.subShown-1] : 0;
        const {totJ,totK,totP,totB} = jtCompute(data.slice(prevSub, subIdx));
        const sty='background:#f97316;color:#fff;font-weight:700;text-align:center;border:none;font-size:8px;padding:3px';
        row+=`<td style="${sty}">${totB||''}</td><td style="${sty}"></td><td style="${sty}">${totJ||''}</td>`;
        if(hasK) row+=`<td style="${sty}">${totK||''}</td>`;
        row+=`<td style="${sty}">${totP||''}</td>`;
        state.subShown++;
      } else if(state.dataIdx < data.length) {
        const r=data[state.dataIdx];
        row+=`<td style="text-align:center">${r.bdg||''}</td><td>${r.warna||'-'}</td><td style="text-align:center">${r.jTanam||''}</td>`;
        if(hasK) row+=`<td style="text-align:center">${r.kacang||''}</td>`;
        row+=`<td style="text-align:center">${r.pBedeng||''}</td>`;
        state.dataIdx++;
      } else {
        const cols = hasK ? 5 : 4;
        row+=`<td colspan="${cols}" style="border:none;background:transparent"></td>`;
      }
      if(bi<bloks.length-1) row+=`<td style="width:4px;background:#fff;border:none"></td>`;
    });
    row+=`</tr>`;
    bodyHtml+=row;
  }

  // Grand total
  let gtRow=`<tr style="background:#FFF3EB">`;
  bloks.forEach((blk,bi)=>{
    const {totJ,totK,totP,totB}=jtCompute(jtData[lok][blk]);
    gtRow+=`<td style="font-weight:700;color:#C2500A;text-align:center">${totB||''}</td>`;
    gtRow+=`<td style="font-weight:700;color:#C2500A">TOTAL</td>`;
    gtRow+=`<td style="font-weight:700;color:#C2500A;text-align:center">${totJ||''}</td>`;
    if(hasK) gtRow+=`<td style="font-weight:700;color:#7C3AED;text-align:center">${totK||''}</td>`;
    gtRow+=`<td style="font-weight:700;color:#C2500A;text-align:center">${totP||''}</td>`;
    if(bi<bloks.length-1) gtRow+=`<td style="width:4px;background:#fff;border:none"></td>`;
  });
  gtRow+=`</tr>`;

  // Rekap warna for print
  const allRows=[]; conf.blok.forEach(blk=>allRows.push(...(jtData[lok][blk]||[])));
  const rw={};
  allRows.forEach(r=>{const w=r.warna||'-';if(w==='-')return;if(!rw[w])rw[w]={jTanam:0,kacang:0};rw[w].jTanam+=parseFloat(r.jTanam||0);rw[w].kacang+=parseFloat(r.kacang||0);});
  let totalBedengPrint=0; allRows.forEach(r=>totalBedengPrint+=parseFloat(r.bdg||0));
  const rekapPrintRows=Object.entries(rw).filter(([w,v])=>v.jTanam>0||v.kacang>0).map(([w,v])=>`<tr><td>${w}</td><td style="text-align:right">${v.jTanam||'-'}</td>${hasK?`<td style="text-align:right">${v.kacang||'-'}</td>`:''}</tr>`).join('');
  let grandJP=0; Object.values(rw).forEach(v=>grandJP+=v.jTanam);

  const html = PX.open(`Jumlah Tanaman ${conf.nama}`)
    + PX.header(`Jumlah Tanaman — ${conf.nama}`, `Dicetak dari Wawan Bunga v14`)
    + `<p style="font-weight:700;text-align:center;font-size:13px;margin-bottom:8px">JUMLAH TANAMAN ${conf.nama.toUpperCase()}</p>
    <table><thead>${thHtml}</thead><tbody>${bodyHtml}${gtRow}</tbody></table>
    <p style="font-weight:700;margin:10px 0 4px;font-size:11px">Rekap Per Warna | Total Bedeng: <span style="color:#C2500A">${totalBedengPrint}</span></p>
    <table style="max-width:300px">
      <thead><tr><th style="text-align:left">WARNA</th><th>J.TANAMAN</th>${hasK?'<th>KACANG</th>':''}</tr></thead>
      <tbody>${rekapPrintRows}</tbody>
      <tfoot><tr class="total"><td>TOTAL</td><td style="text-align:right">${grandJP}</td>${hasK?`<td style="text-align:right">-</td>`:''}</tr></tfoot>
    </table>`
    + PX.close();
  PX.doOpen(html);
}

// ── PLASTIK UV ────────────────────────────────────────────
// ══════════════════════════════════════════════════════════

// Data struktur:
// puvData[lok] = { rows: [{id, rumah, sub}], cols: ['2024-01-15', ...] }
// rows: tiap row bisa "rumah" (group header, merged) atau "sub" (baris A/B/dst)
// puvCells[lok][rowId][colIdx] = value (isi tanggal)

const PUV_CONF = {
  1: { nama:'Kalibanger', color:'#1a6b3c', bg:'#edf7f1' },
  2: { nama:'Tegalroto',  color:'#1D4ED8', bg:'#eff6ff' },
  3: { nama:'Ngadikerso', color:'#7C3AED', bg:'#f5f3ff' },
};

// puvData[lok].rows = [{id, type:'rumah'|'sub', label, rumahId}]
// puvData[lok].cols = [dateStr, ...]
let puvData = {
  1: { rows:[], cols:[] },
  2: { rows:[], cols:[] },
  3: { rows:[], cols:[] },
};
let puvCells = { 1:{}, 2:{}, 3:{} };
let puvNextId = 1;
function puvNewId(){ return puvNextId++; }

// ── RENDER UTAMA ──────────────────────────────────────────
function renderPlastikUV(lok) {
  const conf = PUV_CONF[lok];
  const d = puvData[lok];

  const colCount = d.cols.length;
  const thStyle = `padding:7px 6px;font-size:10px;font-weight:700;color:#fff;background:${conf.color};text-align:center;white-space:nowrap`;
  const thDateStyle = `padding:5px 4px;font-size:9px;font-weight:700;color:#fff;background:${conf.color}cc;text-align:center;min-width:80px`;

  // Header tanggal
  let dateHeaders = d.cols.map((c,ci) => {
    const d2 = c ? new Date(c+'T00:00:00') : null;
    const label = d2 ? `${d2.getDate()}/${d2.getMonth()+1}/${String(d2.getFullYear()).slice(2)}` : 'Tanggal';
    return `<th style="${thDateStyle}">
      <div style="display:flex;align-items:center;justify-content:center;gap:3px">
        <span>${label}</span>
        <button onclick="puvHapusKolom(${lok},${ci})" style="background:rgba(255,255,255,.25);border:none;border-radius:3px;color:#fff;cursor:pointer;padding:1px 4px;font-size:10px;line-height:1">✕</button>
      </div>
    </th>`;
  }).join('');

  // Body rows
  let bodyHtml = '';
  d.rows.forEach((row, ri) => {
    const even = ri % 2 === 0;
    const rowBg = even ? '' : 'background:#fdf8f5';
    if(row.type === 'rumah') {
      // Spanning rumah header cell
      // Count how many consecutive sub rows follow
      let span = 1;
      for(let j=ri+1; j<d.rows.length; j++){
        if(d.rows[j].type==='rumah') break;
        span++;
      }
      const tdS = `background:${conf.bg};font-weight:700;color:${conf.color};font-size:12px;text-align:center;padding:6px 8px;border-bottom:1px solid #e0d0c0;vertical-align:middle`;
      // For rumah row: show rumah label merged over sub count, but HTML tables don't easily merge col 1 across rows
      // Instead: first col shows number, second col shows sub label
      // Actually build as one visible row (type rumah shows number, sub row shows sub letter)
      // ── rumah row is invisible, sub rows carry the number ──
      // Skip rendering rumah rows directly; they are referenced by sub rows
      return;
    }
    // type === 'sub'
    const parentRow = d.rows.find(r => r.id === row.rumahId);
    const rumahNum = parentRow ? parentRow.label : '?';
    // Count siblings (other subs of same rumah)
    const siblings = d.rows.filter(r => r.type==='sub' && r.rumahId === row.rumahId);
    const isFirstSub = siblings[0] && siblings[0].id === row.id;
    const sibCount = siblings.length;

    const tdBase = `padding:6px 5px;font-size:12px;border-bottom:1px solid #e0d0c0;vertical-align:middle`;
    let rowHtml = `<tr style="${rowBg}">`;

    // Col 1: RUMAH number (rowspan over siblings) only for first sub
    if(isFirstSub) {
      rowHtml += `<td rowspan="${sibCount}" style="${tdBase};text-align:center;font-weight:700;background:${conf.bg};color:${conf.color};border-right:1px solid #e0d0c0">
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
          <span>${rumahNum}</span>
          <button onclick="puvHapusRumah(${lok},'${parentRow?parentRow.id:''}')" title="Hapus rumah ini"
            style="background:#fef2f2;border:1px solid #fecaca;border-radius:4px;color:#c0392b;cursor:pointer;padding:2px 5px;font-size:10px;line-height:1">✕</button>
        </div>
      </td>`;
    }

    // Col 2: sub label (A, B, dst) + hapus sub
    rowHtml += `<td style="${tdBase};border-right:1px solid #e0d0c0;text-align:center">
      <div style="display:flex;align-items:center;justify-content:center;gap:4px">
        <span style="font-weight:600;color:#555">${row.label}</span>
        <button onclick="puvHapusSub(${lok},'${row.id}')" title="Hapus baris ini"
          style="background:#fef2f2;border:1px solid #fecaca;border-radius:4px;color:#c0392b;cursor:pointer;padding:2px 4px;font-size:10px;line-height:1">✕</button>
        <button onclick="puvTambahSub(${lok},'${parentRow?parentRow.id:''}')" title="Tambah sub baris"
          style="background:#edf7f1;border:1px solid #c3e8d4;border-radius:4px;color:#1a6b3c;cursor:pointer;padding:2px 4px;font-size:10px;line-height:1">+</button>
      </div>
    </td>`;

    // Date cols
    d.cols.forEach((col, ci) => {
      const val = (puvCells[lok][row.id]&&puvCells[lok][row.id][ci]) || '';
      rowHtml += `<td style="${tdBase};text-align:center;min-width:80px">
        <input type="date" value="${val}"
          style="border:1.5px solid #e0d0c0;border-radius:6px;padding:4px 3px;font-size:11px;width:100%;background:#fff;color:#1a0e05;outline:none"
          onchange="puvSetCell(${lok},'${row.id}',${ci},this.value)">
      </td>`;
    });

    rowHtml += `</tr>`;
    bodyHtml += rowHtml;
  });

  if(!bodyHtml) {
    const emptySpan = 2 + colCount;
    bodyHtml = `<tr><td colspan="${emptySpan}" style="text-align:center;color:#bbb;padding:20px;font-size:12px">Belum ada data — klik Tambah Rumah</td></tr>`;
  }

  document.getElementById('MC').innerHTML = `
  <!-- Toolbar -->
  <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
    <button class="btn-save" style="padding:8px 14px;font-size:12px;background:${conf.color};border:none;cursor:pointer;flex:1;min-width:120px"
      onclick="puvTambahRumah(${lok})">
      <i class="ti ti-plus"></i> Tambah Rumah
    </button>
    <button class="btn-save" style="padding:8px 14px;font-size:12px;background:#1D4ED8;border:none;cursor:pointer;flex:1;min-width:120px"
      onclick="puvTambahKolom(${lok})">
      <i class="ti ti-calendar-plus"></i> + Kolom Tanggal
    </button>
  </div>
  <div style="font-size:11px;color:var(--tl);margin-bottom:10px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:6px 10px">
    💡 Klik <strong>✕</strong> di header kolom untuk hapus kolom. Klik <strong>✕</strong> di rumah/baris untuk hapus baris.
  </div>

  <!-- Tabel -->
  <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;border:1.5px solid #e0d0c0">
    <table style="width:100%;border-collapse:collapse;min-width:${200+colCount*90}px">
      <thead>
        <tr>
          <th style="${thStyle};min-width:54px" rowspan="1">RUMAH</th>
          <th style="${thStyle};min-width:60px"></th>
          ${dateHeaders}
        </tr>
      </thead>
      <tbody>
        ${bodyHtml}
      </tbody>
    </table>
  </div>`;
}

// ── ACTIONS ───────────────────────────────────────────────
function puvTambahRumah(lok) {
  const d = puvData[lok];
  const rumahRows = d.rows.filter(r=>r.type==='rumah');
  const nextNum = rumahRows.length + 1;
  const rumahId = puvNewId();
  const subId = puvNewId();
  d.rows.push({ id: rumahId, type:'rumah', label: String(nextNum) });
  d.rows.push({ id: subId,   type:'sub',   label:'A', rumahId });
  if(!puvCells[lok][subId]) puvCells[lok][subId] = {};
  renderPlastikUV(lok);
  savePUV();
  toast('✅ Rumah ' + nextNum + ' ditambahkan');
}

function puvTambahSub(lok, rumahId) {
  const d = puvData[lok];
  const rId = parseInt(rumahId);
  const siblings = d.rows.filter(r=>r.type==='sub' && r.rumahId===rId);
  const labels = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const nextLabel = labels[siblings.length] || String(siblings.length+1);
  const subId = puvNewId();
  let insertIdx = d.rows.findIndex(r=>r.id===rId);
  for(let i=insertIdx+1; i<d.rows.length; i++) {
    if(d.rows[i].type==='rumah') { insertIdx=i; break; }
    insertIdx=i+1;
  }
  if(insertIdx>d.rows.length) insertIdx=d.rows.length;
  d.rows.splice(insertIdx,0,{ id:subId, type:'sub', label:nextLabel, rumahId:rId });
  if(!puvCells[lok][subId]) puvCells[lok][subId]={};
  renderPlastikUV(lok);
  savePUV();
  toast('✅ Sub baris ditambahkan');
}

function puvHapusRumah(lok, rumahId) {
  const rId = parseInt(rumahId);
  puvData[lok].rows = puvData[lok].rows.filter(r => !(r.id===rId || (r.type==='sub' && r.rumahId===rId)));
  renderPlastikUV(lok);
  savePUV();
  toast('🗑️ Rumah dihapus');
}

function puvHapusSub(lok, subId) {
  const sId = parseInt(subId);
  puvData[lok].rows = puvData[lok].rows.filter(r => r.id!==sId);
  delete puvCells[lok][sId];
  renderPlastikUV(lok);
  savePUV();
  toast('🗑️ Baris dihapus');
}

function puvTambahKolom(lok) {
  puvData[lok].cols.push('');
  renderPlastikUV(lok);
  savePUV();
  toast('✅ Kolom tanggal ditambahkan');
}

function puvHapusKolom(lok, ci) {
  puvData[lok].cols.splice(ci,1);
  Object.values(puvCells[lok]).forEach(rowCells => {
    const newCells = {};
    Object.entries(rowCells).forEach(([k,v]) => {
      const ki = parseInt(k);
      if(ki < ci) newCells[ki] = v;
      else if(ki > ci) newCells[ki-1] = v;
    });
    Object.keys(rowCells).forEach(k => delete rowCells[k]);
    Object.assign(rowCells, newCells);
  });
  renderPlastikUV(lok);
  savePUV();
  toast('🗑️ Kolom dihapus');
}

// Debounce untuk puvSetCell agar tidak spam Firebase tiap ketik
let puvSaveTimer = null;
function puvSetCell(lok, subId, ci, val) {
  const sId = parseInt(subId);
  if(!puvCells[lok][sId]) puvCells[lok][sId]={};
  puvCells[lok][sId][ci] = val;
  if(val && !puvData[lok].cols[ci]) {
    puvData[lok].cols[ci] = val;
    renderPlastikUV(lok);
  }
  clearTimeout(puvSaveTimer);
  puvSaveTimer = setTimeout(() => savePUV(), 1500);
}

// Hapus akun (di luar saveMO)
function hapusAkun(uid) {
  if (uid === CU.id) { toast('⛔ Tidak bisa hapus akun sendiri!'); return; }
  const u = USERS.find(x=>x.id===uid);
  if (!u) return;
  if (!confirm(`Hapus akun "${u.name}" (@${u.username})?\nTindakan ini tidak bisa dibatalkan.`)) return;
  USERS.splice(USERS.findIndex(x=>x.id===uid),1);
  saveUsers();
  toast('🗑️ Akun dihapus');
  renderAkunAdmin();
}
